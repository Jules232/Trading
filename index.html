    // --- FONCTIONS UTILITAIRES ---
    const formatPlayTime = (seconds) => {
        if (!seconds) return "0h 0m";

    // --- SYNTHÉTISEUR AUDIO WEB AUDIO API ---
    let globalAudioCtx = null;
    const playSound = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        if (!globalAudioCtx) globalAudioCtx = new AudioContext();
        if (globalAudioCtx.state === 'suspended') globalAudioCtx.resume();
        const ctx = globalAudioCtx;
        const now = ctx.currentTime;

        if (type === 'claim' || type === 'win' || type === 'buy_upgrade') {
          const notes = type === 'buy_upgrade' ? [440, 554.37, 659.25, 880] : (type === 'claim' ? [587.33, 880] : [523.25, 659.25, 783.99, 1046.50]);
          notes.forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = type === 'buy_upgrade' ? 'triangle' : 'sine';
            osc.frequency.setValueAtTime(freq, now + i * 0.08);
            gain.gain.setValueAtTime(0.12, now + i * 0.08);
            gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.25);
            osc.start(now + i * 0.08); osc.stop(now + i * 0.08 + 0.3);
          });
        } else if (type === 'lose' || type === 'error') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(type === 'error' ? 150 : 220, now);
          osc.frequency.linearRampToValueAtTime(type === 'error' ? 100 : 110, now + 0.45);
          gain.gain.setValueAtTime(0.12, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.45);
          osc.start(now); osc.stop(now + 0.5);
        } else if (type === 'tick') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(800, now);
          gain.gain.setValueAtTime(0.05, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.04);
          osc.start(now); osc.stop(now + 0.05);
        }
      } catch (e) { console.warn("Audio bloqué", e); }
    };

    ];

    // --- COMPOSANT GRAPHIQUE SVG AMÉLIORÉ ---
    const SparklineChart = ({ data, isPositive, averageBuyPrice, sharesCount, zoomLevel, showMarkers, transactions, themeColor }) => {
      const containerRef = useRef(null);
      const [dimensions, setDimensions] = useState({ width: 0, height: 0 });

      useEffect(() => {
        if (!containerRef.current) return;
        const observer = new ResizeObserver(entries => {
          if (!Array.isArray(entries) || !entries.length) return;
          const { width, height } = entries[0].contentRect;
          setDimensions({ width, height });
        });
        observer.observe(containerRef.current);
        return () => observer.disconnect();
      }, []);

      const { width, height } = dimensions;

      const visibleData = useMemo(() => {
        if (!data || data.length === 0) return [];
        const visibleCount = Math.max(10, Math.floor(data.length / zoomLevel));
        return data.slice(-visibleCount);
      }, [data, zoomLevel]);

      const chartStats = useMemo(() => {
        if (!visibleData || visibleData.length === 0 || width === 0 || height === 0) return null;
        let minVal = Math.min(...visibleData);
        let maxVal = Math.max(...visibleData);
        if (sharesCount > 0 && averageBuyPrice) {
          minVal = Math.min(minVal, averageBuyPrice);
          maxVal = Math.max(maxVal, averageBuyPrice);
        }
        minVal *= 0.99; maxVal *= 1.01;
        const range = maxVal - minVal || 1;

        const points = visibleData.map((val, index) => {
          const x = (index / (visibleData.length - 1)) * width;
          const y = height - ((val - minVal) / range) * height;
          return `${x},${y}`;
        });

        return { path: `M ${points.join(' L ')}`, minVal, maxVal, range, dataLength: visibleData.length };
      }, [visibleData, width, height, averageBuyPrice, sharesCount]);

      const defaultColor = isPositive ? '#10b981' : '#f43f5e';
      const color = themeColor === 'amber' ? '#f59e0b' : themeColor === 'fuchsia' ? '#d946ef' : defaultColor;

      return (
        <div ref={containerRef} className="w-full h-full relative overflow-hidden rounded-xl">
          {width > 0 && height > 0 && chartStats && (
            <svg width={width} height={height} className="overflow-visible">
              <defs>
                <linearGradient id="gradient" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0%" stopColor={color} stopOpacity="0.3" />
                  <stop offset="100%" stopColor={color} stopOpacity="0.0" />
                </linearGradient>
              </defs>
              
              <path d={`${chartStats.path} L ${width},${height} L 0,${height} Z`} fill="url(#gradient)" className="transition-all duration-300 ease-linear" />
              <path d={chartStats.path} fill="none" stroke={color} strokeWidth="3" strokeLinejoin="round" strokeLinecap="round" className="transition-all duration-300 ease-linear" style={{ filter: `drop-shadow(0 0 8px ${color}88)` }} />
              
              {sharesCount > 0 && averageBuyPrice > 0 && (
                <g className="transition-all duration-500 ease-in-out">
                  <line x1="0" y1={height - ((averageBuyPrice - chartStats.minVal) / chartStats.range) * height} x2={width} y2={height - ((averageBuyPrice - chartStats.minVal) / chartStats.range) * height} stroke="#a1a1aa" strokeWidth="1.5" strokeDasharray="6,4" className="opacity-70" />
                  <rect x="10" y={Math.max(5, Math.min(height - 25, height - ((averageBuyPrice - chartStats.minVal) / chartStats.range) * height - 12))} width="74" height="18" rx="4" fill="#27272a" className="opacity-95" />
                  <text x="14" y={Math.max(17, Math.min(height - 13, height - ((averageBuyPrice - chartStats.minVal) / chartStats.range) * height + 1))} fill="#e4e4e7" fontSize="9" fontWeight="bold" fontFamily="monospace">
                    ACHAT: ${averageBuyPrice.toFixed(1)}
                  </text>
                </g>
              )}

              {showMarkers && transactions && transactions.map((tx, i) => {
                 const timeDiff = Date.now() - tx.time;
                 const estimatedTickMs = 700; 
                 const windowMs = chartStats.dataLength * estimatedTickMs; 
                 
                 if (timeDiff > windowMs) return null;
                 
                 const x = width - (timeDiff / windowMs) * width;
                 const y = height - ((tx.price - chartStats.minVal) / chartStats.range) * height;
                 const txColor = tx.type === 'BUY' ? '#10b981' : '#f43f5e';
                 
                 return (
                   <g key={i} className="animate-in fade-in zoom-in duration-500">
                     <circle cx={x} cy={y} r="5" fill={txColor} opacity="0.8" style={{ filter: `drop-shadow(0 0 4px ${txColor})` }}/>
                     <circle cx={x} cy={y} r="8" fill="none" stroke={txColor} strokeWidth="1.5" className="animate-ping opacity-50" />
                   </g>
                 )
              })}

              <circle cx={width} cy={height - ((visibleData[visibleData.length - 1] - chartStats.minVal) / chartStats.range) * height} r="5" fill={color} className="animate-pulse" style={{ filter: `drop-shadow(0 0 10px ${color})` }} />
            </svg>
          )}
        </div>
      );
    };

    // --- COMPOSANT PRINCIPAL APP ---
    function App() {
      // FONDS AETERNA (LONG TERME) - +1% garanti toutes les 24h
      const getAeternaPrice = () => {
        const genesisDate = 1704067200000; // 1 Jan 2024 (Point de départ)
        const daysElapsed = Math.max(0, (Date.now() - genesisDate) / (24 * 60 * 60 * 1000));
        return 100 * Math.pow(1.01, daysElapsed); 
      };

      const [user, setUser] = useState(null);

      const [activeMarketId, setActiveMarketId] = useState('m_medium');

      const [onlineCount, setOnlineCount] = useState(1);

      const [activeTab, setActiveTab] = useState('trade');

      const [pseudoInput, setPseudoInput] = useState('');
      const [selectedPlayer, setSelectedPlayer] = useState(null);

      const [stakingEarnings, setStakingEarnings] = useState(0);

      const [rouletteBet, setRouletteBet] = useState(100);
      const [rouletteColor, setRouletteColor] = useState('red');
      const [isSpinning, setIsSpinning] = useState(false);
      const [rouletteWinnerNum, setRouletteWinnerNum] = useState(null);
      const [rouletteWinnerColor, setRouletteWinnerColor] = useState(null);
      const [rouletteStatusMessage, setRouletteStatusMessage] = useState("Faites vos jeux !");

      const [zoomLevel, setZoomLevel] = useState(1);
      const [tradeQuantity, setTradeQuantity] = useState(1); // x1 ou x10
      const [aeternaPrice, setAeternaPrice] = useState(getAeternaPrice());
      
      // Liste des IDs d'événements majeurs masqués localement pour moins d'intrusion
      const [dismissedEvents, setDismissedEvents] = useState([]);

      // SYSTÈME DE NOTIFICATIONS TOAST
      const [notifications, setNotifications] = useState([]);
      const triggeredAlertsRef = useRef({});

      const addNotification = (message, type = 'info') => {
        const id = Date.now() + Math.random();
        setNotifications(prev => [...prev, { id, message, type }]);
        setTimeout(() => {
          setNotifications(prev => prev.filter(n => n.id !== id));
        }, 5000);
      };

      const marketsRefState = useRef(markets);
      useEffect(() => { marketsRefState.current = markets; }, [markets]);

      // Met à jour le prix long terme
      useEffect(() => {
        const interval = setInterval(() => setAeternaPrice(getAeternaPrice()), 1000);
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              try { await signInWithCustomToken(auth, __initial_auth_token); } 
              catch (e) { await signInAnonymously(auth); }
            } else { await signInAnonymously(auth); }
          } catch (error) { console.error("Auth error:", error); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => setUser(currentUser));
        return () => unsubscribe();
      }, []);

      const portfolioRefState = useRef(portfolio);
      const totalValueRef = useRef(0);
      useEffect(() => { portfolioRefState.current = portfolio; }, [portfolio]);

      useEffect(() => {
        if (!user) return;
        const updatePresence = async () => {
          const presenceRef = doc(db, 'artifacts', appId, 'public', 'data', 'online_users', user.uid);
          try { await setDoc(presenceRef, { lastActive: Date.now() }, { merge: true }); } catch (error) {}

          const p = portfolioRefState.current;
          const tv = totalValueRef.current;
          if (p && p.pseudo) {
             const currentStats = p.stats || { totalProfit: 0, totalTrades: 0, winningTrades: 0, bestTrade: 0, worstTrade: 0, highestPortfolio: 10000, playTimeSeconds: 0 };
             let updatedStats = { ...currentStats };
             updatedStats.playTimeSeconds = (updatedStats.playTimeSeconds || 0) + 15;
             if (tv > (updatedStats.highestPortfolio || 0)) {
                 updatedStats.highestPortfolio = tv;
             }
             const pRef = doc(db, 'artifacts', appId, 'users', user.uid, 'portfolio', 'state');
             setDoc(pRef, { stats: updatedStats }, { merge: true });

             // Synchronisation du leaderboard avec les stats pour que les autres joueurs puissent les voir
             const lbRef = doc(db, 'artifacts', appId, 'public', 'data', 'leaderboard', user.uid);
             setDoc(lbRef, { pseudo: p.pseudo, totalValue: tv, lastUpdated: Date.now(), stats: updatedStats }, { merge: true });
          }
        };
        updatePresence();
        const presenceInterval = setInterval(updatePresence, 15000);

        const onlineUsersRef = collection(db, 'artifacts', appId, 'public', 'data', 'online_users');
        const unsubPresence = onSnapshot(onlineUsersRef, (snapshot) => {
          const now = Date.now();
          let count = 0;
          snapshot.forEach(doc => { if (now - doc.data().lastActive < 30000) count++; });
          setOnlineCount(Math.max(1, count));
        });

        return () => { clearInterval(presenceInterval); unsubPresence(); };
      }, [user]);

      useEffect(() => {
        if (!user) return;
        const portfolioRef = doc(db, 'artifacts', appId, 'users', user.uid, 'portfolio', 'state');

        const initMarkets = async () => {
          for (const mId of MARKET_IDS) {
            const mRef = doc(db, 'artifacts', appId, 'public', 'data', 'markets', mId);
            const snap = await getDoc(mRef);
            if (!snap.exists()) {
              await setDoc(mRef, {
                price: MARKETS_CONFIG[mId].basePrice,
                history: Array(50).fill(MARKETS_CONFIG[mId].basePrice),
                trend: 0, sentimentScore: 0, news: `Ouverture du marché ${MARKETS_CONFIG[mId].name}.`, newsType: 'neutral',
                lastUpdate: Date.now(), leaderId: user.uid, leaderHeartbeat: Date.now()
              });
            }
          }
        };
        initMarkets();

        const unsubscribers = [];
        for (const mId of MARKET_IDS) {
          const mRef = doc(db, 'artifacts', appId, 'public', 'data', 'markets', mId);
          const unsub = onSnapshot(mRef, (docSnap) => {
            if (docSnap.exists()) setMarkets(prev => ({ ...prev, [mId]: docSnap.data() }));
          });
          unsubscribers.push(unsub);
        }

        const initPortfolio = async () => {
          const snap = await getDoc(portfolioRef);
          if (!snap.exists()) {
            await setDoc(portfolioRef, {
              balance: 10000.00,
              v2_reset: true,
              lastWeeklyClaim: 0,
              assets: { 'm_slow': { shares: 0, averageBuyPrice: 0 }, 'm_medium': { shares: 0, averageBuyPrice: 0 }, 'm_fast': { shares: 0, averageBuyPrice: 0 } },
              lastRewardClaim: 0, pseudo: "", streak: 1,
              upgrades: { theme: 'default', unlockedThemes: ['default'], extendedHistory: false, tradeMarkers: false, diamondHands: false, unlockedMarkets: ['m_medium'], laboUnlocked: false, insiderTrading: false, whaleWallet: false },
              transactions: { 'm_slow': [], 'm_medium': [], 'm_fast': [] },
              achievements: [],
              stats: { totalProfit: 0, totalTrades: 0, winningTrades: 0, bestTrade: 0, worstTrade: 0, highestPortfolio: 10000, playTimeSeconds: 0 },
              dailyQuests: {
                lastReset: Date.now(),
                tradesCount: 0,
                rouletteCount: 0,
                aeternaBought: 0,
                claimedToday: false
              }
            });
          } else {
            const data = snap.data();
            let updates = {};
            if (!data.v2_reset) {
                updates.balance = 10000.00;
                updates.v2_reset = true;
            }
            if (data.lastWeeklyClaim === undefined) updates.lastWeeklyClaim = 0;
            if (!data.stats) updates.stats = { totalProfit: 0, totalTrades: 0, winningTrades: 0, bestTrade: 0, worstTrade: 0, highestPortfolio: 10000, playTimeSeconds: 0 };
            if (Object.keys(updates).length > 0) {
                await setDoc(portfolioRef, updates, { merge: true });
            }
          }
        };
        initPortfolio();

        const unsubPortfolio = onSnapshot(portfolioRef, (docSnap) => {

              const timeSinceLastUpdate = now - currentMarket.lastUpdate;
              const targetDelay = config.tickRate === 0 ? 400 : (config.tickRate === 1 ? 900 : 1900);
              let newSentiment = (currentMarket.sentimentScore || 0) * 0.85; 
              if (Math.abs(newSentiment) < 0.1) newSentiment = 0;

              // GESTION DES EVENEMENTS FLASH CRASH / BULL RUN (RETENTION FORTE)
              let activeEvent = currentMarket.flashEvent || null;
              if (activeEvent && activeEvent.active && now >= activeEvent.endTime) {
                // Fin de l'évènement
                await setDoc(mRef, { flashEvent: deleteField() }, { merge: true });
                activeEvent = null;
              }

              // Déclenchement aléatoire d'un évènement si aucun n'est actif (0,8% de chance par tick)
              if (!activeEvent && Math.random() < 0.008) {
                const eventType = Math.random() < 0.5 ? 'flash_crash' : 'bull_run';
                activeEvent = {
                  type: eventType,
                  endTime: now + 45000, // Dure 45 secondes
                  active: true
                };
                await setDoc(mRef, { flashEvent: activeEvent }, { merge: true });
              }

              if (timeSinceLastUpdate > targetDelay) {
                let newTrend = currentMarket.trend * 0.92;
                let currentNews = currentMarket.news;
                let currentNewsType = currentMarket.newsType;

                // Application des multiplicateurs d'évènements flash
                let eventFactor = 1.0;
                let eventBias = 0.0;
                if (activeEvent && activeEvent.active) {
                  eventFactor = 2.5; // Volatilité multipliée par 2.5
                  eventBias = activeEvent.type === 'bull_run' ? config.vol * 1.5 : -config.vol * 1.5;
                }

                newTrend += ((Math.random() - 0.5) * config.vol * eventFactor) + eventBias;

                if (Math.random() < 0.05) {
                  const event = NEWS_EVENTS[Math.floor(Math.random() * NEWS_EVENTS.length)];
                  newTrend += event.impact; 
                  currentNews = event.text; currentNewsType = event.isGrey ? 'grey' : (event.impact > 0 ? 'positive' : 'negative');

                let newPrice = currentMarket.price + newTrend;
                if (newPrice <= 1.5) { newPrice = 1.5; newTrend = Math.abs(newTrend) + 1.0; }

                const newHistory = [...currentMarket.history, newPrice];
                if (newHistory.length > 50) newHistory.shift();

                try {
                  await setDoc(mRef, { price: newPrice, history: newHistory, trend: newTrend, sentimentScore: newSentiment, news: currentNews, newsType: currentNewsType, lastUpdate: now, leaderHeartbeat: now }, { merge: true });
                } catch (e) {}
              } else {
                if (now - (currentMarket.leaderHeartbeat || 0) > 3000) {
                  try { await setDoc(mRef, { leaderHeartbeat: now, sentimentScore: newSentiment }, { merge: true }); } catch (e) {}
                }
              }
            }
          }
