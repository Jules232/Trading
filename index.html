    <!-- DÉBUT DE TON CODE INTACT -->
    <script type="text/babel" data-type="module">
    import { createRoot } from 'react-dom/client';
    
    import React, { useState, useEffect, useRef, useMemo } from 'react';
    import { initializeApp } from 'firebase/app';
    import { 
      getAuth,

    import {

      deleteField
    } from 'firebase/firestore';
    import { 
      TrendingUp, 
      TrendingDown, 
      Activity, 
      AlertCircle, 
      DollarSign, 
      Briefcase,
      Zap,
      Globe,
      Users,
      Gift,
      LineChart,
      Trophy,
      Info,
      X,
      Flame,
      Coins,
      Dices,
      HelpCircle
    } from 'lucide-react';

    // --- INITIALISATION FIREBASE ---
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    // --- PARAMÈTRES DU JEU ---
    const REWARD_COOLDOWN = 24 * 60 * 60 * 1000; // 24 heures en millisecondes
    const REWARD_AMOUNT = 500; // Montant de base du bonus journalier
    const MAX_STAKING_RESERVOIR = 50.00; // Intérêt passif cumulable max
    const STAKING_RATE = 0.05; // $ accumulés par seconde

    // --- CONFIGURATION DES 3 MARCHÉS (NOMS CACHÉS) ---
    const MARKETS_CONFIG = {
      'm_slow': { id: 'm_slow', name: 'SafeBuild', basePrice: 50, vol: 0.6, tickRate: 3 }, // Lent
      'm_medium': { id: 'm_medium', name: 'Tradex', basePrice: 100, vol: 2.5, tickRate: 1 }, // Moyen
      'm_fast': { id: 'm_fast', name: 'QuantumX', basePrice: 15, vol: 6.0, tickRate: 0 } // Rapide
    };
    const MARKET_IDS = Object.keys(MARKETS_CONFIG);

    // --- SYNTHÉTISEUR AUDIO WEB AUDIO API (AUTO-CONTENU) ---
    let globalAudioCtx = null;
    const playSound = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        
        if (!globalAudioCtx) {
          globalAudioCtx = new AudioContext();
        }
        if (globalAudioCtx.state === 'suspended') {
          globalAudioCtx.resume();
        }
        
        const ctx = globalAudioCtx;
        const now = ctx.currentTime;

        if (type === 'claim' || type === 'win') {
          // Son de récompense joyeux (Arpège ascendant rapide)
          const notes = type === 'claim' ? [587.33, 880] : [523.25, 659.25, 783.99, 1046.50];
          notes.forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + i * 0.08);
            gain.gain.setValueAtTime(0.12, now + i * 0.08);
            gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.25);
            osc.start(now + i * 0.08);
            osc.stop(now + i * 0.08 + 0.3);
          });
        } else if (type === 'lose') {
          // Son de défaite (Baisse de fréquence un peu triste)
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(220, now);
          osc.frequency.linearRampToValueAtTime(110, now + 0.45);
          gain.gain.setValueAtTime(0.12, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.45);
          osc.start(now);
          osc.stop(now + 0.5);
        } else if (type === 'tick') {
          // Son mécanique de rotation roulette
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(800, now);
          gain.gain.setValueAtTime(0.05, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.04);
          osc.start(now);
          osc.stop(now + 0.05);
        }
      } catch (e) {
        console.warn("Audio Context bloqué ou non pris en charge par le navigateur :", e);
      }
    };

    // --- ACTUALITÉS ALÉATOIRES (ENRICHIES + GRISES) ---
    const NEWS_EVENTS = [
      // Actualités classiques
      { text: "Elon Musk tweete un mème sur l'entreprise.", impact: 15 },
      { text: "Faille de sécurité majeure découverte dans le système.", impact: -20 },
      { text: "Nouveau partenariat stratégique avec un géant de la tech.", impact: 12 },
      { text: "Rumeurs d'une régulation drastique imminente.", impact: -25 },
      { text: "Bénéfices records annoncés ce trimestre !", impact: 18 },
      { text: "Le PDG démissionne soudainement.", impact: -15 },
      { text: "Adoption massive de la technologie par le grand public.", impact: 10 },
      { text: "Un concurrent lance un produit nettement supérieur.", impact: -12 },
      { text: "L'entreprise achète pour 1 milliard de Bitcoin.", impact: 8 },
      { text: "Enquête du régulateur financier ouverte aujourd'hui.", impact: -18 },
      
      // Nouvelles Actualités Grises (Mystères)
      { text: "Le gouvernement annonce une nouvelle loi de régulation sur le secteur.", impact: -15, isGrey: true },
      { text: "Changement inattendu à la direction financière ce matin.", impact: -12, isGrey: true },
      { text: "Une rumeur d'acquisition circule activement sur les réseaux sociaux.", impact: 20, isGrey: true },
      { text: "Publication imminente du rapport trimestriel très attendu.", impact: 10, isGrey: true },
      { text: "Mouvement suspect de fonds détecté sur les comptes de l'entreprise.", impact: -20, isGrey: true },
      { text: "Un tweet mystérieux du PDG fait le buzz mondial.", impact: 15, isGrey: true }
    ];

    // --- COMPOSANT GRAPHIQUE SVG SUR MESURE ---
    const SparklineChart = ({ data, isPositive, averageBuyPrice, sharesCount }) => {
      const containerRef = useRef(null);
      const [dimensions, setDimensions] = useState({ width: 0, height: 0 });

      useEffect(() => {
        const updateSize = () => {
          if (containerRef.current) {
            setDimensions({
              width: containerRef.current.clientWidth || containerRef.current.offsetWidth || 0,
              height: containerRef.current.clientHeight || containerRef.current.offsetHeight || 0
            });
          }
        };
        
        const timer = setTimeout(updateSize, 100);
        window.addEventListener('resize', updateSize);
        updateSize();
        return () => {
          window.removeEventListener('resize', updateSize);
          clearTimeout(timer);
        };
      }, [data]);

      const { width, height } = dimensions;

      const chartStats = useMemo(() => {
        if (!data || data.length === 0 || width === 0 || height === 0) return null;
        
        let minVal = Math.min(...data);
        let maxVal = Math.max(...data);
        
        if (sharesCount > 0 && averageBuyPrice) {
          minVal = Math.min(minVal, averageBuyPrice);
          maxVal = Math.max(maxVal, averageBuyPrice);
        }

        minVal *= 0.99;
        maxVal *= 1.01;
        const range = maxVal - minVal || 1;

        const points = data.map((val, index) => {
          const x = (index / (data.length - 1)) * width;
          const y = height - ((val - minVal) / range) * height;
          return `${x},${y}`;
        });

        return {
          path: `M ${points.join(' L ')}`,
          minVal,
          maxVal,
          range
        };
      }, [data, width, height, averageBuyPrice, sharesCount]);

      const color = isPositive ? '#10b981' : '#f43f5e';

      return (
        <div ref={containerRef} className="w-full h-full relative overflow-hidden">
          {width > 0 && height > 0 && chartStats && (
            <svg width={width} height={height} className="overflow-visible">
              <defs>
                <linearGradient id="gradient" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0%" stopColor={color} stopOpacity="0.3" />
                  <stop offset="100%" stopColor={color} stopOpacity="0.0" />
                </linearGradient>
              </defs>
              
              <path
                d={`${chartStats.path} L ${width},${height} L 0,${height} Z`}
                fill="url(#gradient)"
                className="transition-all duration-300 ease-linear"
              />
              
              <path
                d={chartStats.path}
                fill="none"
                stroke={color}
                strokeWidth="3"
                strokeLinejoin="round"
                strokeLinecap="round"
                className="transition-all duration-300 ease-linear"
                style={{ filter: `drop-shadow(0 0 8px ${color}88)` }}
              />
              
              {sharesCount > 0 && averageBuyPrice > 0 && (
                <g className="transition-all duration-500 ease-in-out">
                  <line
                    x1="0"
                    y1={height - ((averageBuyPrice - chartStats.minVal) / chartStats.range) * height}
                    x2={width}
                    y2={height - ((averageBuyPrice - chartStats.minVal) / chartStats.range) * height}
                    stroke="#a1a1aa"
                    strokeWidth="1.5"
                    strokeDasharray="6,4"
                    className="opacity-70"
                  />
                  <rect 
                    x="10" 
                    y={Math.max(5, Math.min(height - 25, height - ((averageBuyPrice - chartStats.minVal) / chartStats.range) * height - 12))} 
                    width="74" 
                    height="18" 
                    rx="4" 
                    fill="#27272a" 
                    className="opacity-95"
                  />
                  <text
                    x="14"
                    y={Math.max(17, Math.min(height - 13, height - ((averageBuyPrice - chartStats.minVal) / chartStats.range) * height + 1))}
                    fill="#e4e4e7"
                    fontSize="9"
                    fontWeight="bold"
                    fontFamily="monospace"
                  >
                    ACHAT: ${averageBuyPrice.toFixed(1)}
                  </text>
                </g>
              )}

              <circle
                 cx={width}
                 cy={height - ((data[data.length - 1] - chartStats.minVal) / chartStats.range) * height}
                 r="5"
                 fill={color}
                 className="animate-pulse"
                 style={{ filter: `drop-shadow(0 0 10px ${color})` }}
              />
            </svg>
          )}
        </div>
      );
    };

    // --- COMPOSANT PRINCIPAL ---
    function App() {
      const [user, setUser] = useState(null);
      const [portfolio, setPortfolio] = useState(null);
      const [markets, setMarkets] = useState({});
      const [activeMarketId, setActiveMarketId] = useState('m_medium');
      const [isLoading, setIsLoading] = useState(true);
      
      const [onlineCount, setOnlineCount] = useState(1);
      const [timeToReward, setTimeToReward] = useState(0);

      const [activeTab, setActiveTab] = useState('trade');
      const [leaderboard, setLeaderboard] = useState([]);
      const [pseudoInput, setPseudoInput] = useState('');
      const [showInfo, setShowInfo] = useState(false);

      // --- ÉTAT D'ACCUMULATION D'INTÉRÊTS ACTIFS ---
      const [stakingEarnings, setStakingEarnings] = useState(0);

      // --- ÉTATS DU MINI-JEU DE CASINO (ROULETTE) ---
      const [rouletteBet, setRouletteBet] = useState(100);
      const [rouletteColor, setRouletteColor] = useState('red');
      const [isSpinning, setIsSpinning] = useState(false);
      const [rouletteWinnerNum, setRouletteWinnerNum] = useState(null);
      const [rouletteWinnerColor, setRouletteWinnerColor] = useState(null);
      const [rouletteStatusMessage, setRouletteStatusMessage] = useState("Faites vos jeux !");

      const marketsRefState = useRef(markets);
      useEffect(() => {
        marketsRefState.current = markets;
      }, [markets]);

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              try {
                await signInWithCustomToken(auth, __initial_auth_token);
              } catch (tokenError) {
                await signInAnonymously(auth);
              }
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("Erreur d'authentification:", error);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;

        const updatePresence = async () => {
          const presenceRef = doc(db, 'artifacts', appId, 'public', 'data', 'online_users', user.uid);
          try {
            await setDoc(presenceRef, { lastActive: Date.now() }, { merge: true });
          } catch (error) {}
        };

        updatePresence();
        const presenceInterval = setInterval(updatePresence, 15000);

        const onlineUsersRef = collection(db, 'artifacts', appId, 'public', 'data', 'online_users');
        const unsubPresence = onSnapshot(onlineUsersRef, (snapshot) => {
          const now = Date.now();
          let count = 0;
          snapshot.forEach(doc => {
            if (now - doc.data().lastActive < 30000) count++;
          });
          setOnlineCount(Math.max(1, count));
        }, (error) => console.error("Erreur lecture présence:", error));

        return () => {
          clearInterval(presenceInterval);
          unsubPresence();
        };
      }, [user]);

      // Initialisation de Firebase (Portfolio + 3 Marchés)
      useEffect(() => {
        if (!user) return;

        const portfolioRef = doc(db, 'artifacts', appId, 'users', user.uid, 'portfolio', 'state');

        // Init et écoute des marchés
        const initMarkets = async () => {
          for (const mId of MARKET_IDS) {
            const mRef = doc(db, 'artifacts', appId, 'public', 'data', 'markets', mId);
            const snap = await getDoc(mRef);
            if (!snap.exists()) {
              await setDoc(mRef, {
                price: MARKETS_CONFIG[mId].basePrice,
                history: Array(40).fill(MARKETS_CONFIG[mId].basePrice),
                trend: 0,
                sentimentScore: 0, // NOUVEAU: Score de sentiment des joueurs
                news: `Ouverture du marché ${MARKETS_CONFIG[mId].name}.`,
                newsType: 'neutral',
                lastUpdate: Date.now(),
                leaderId: user.uid,
                leaderHeartbeat: Date.now()
              });
            }
          }
        };
        initMarkets();

        const unsubscribers = [];
        for (const mId of MARKET_IDS) {
          const mRef = doc(db, 'artifacts', appId, 'public', 'data', 'markets', mId);
          const unsub = onSnapshot(mRef, (docSnap) => {
            if (docSnap.exists()) {
              setMarkets(prev => ({ ...prev, [mId]: docSnap.data() }));
            }
          }, (error) => console.error(`Erreur market ${mId}:`, error));
          unsubscribers.push(unsub);
        }

        const initPortfolio = async () => {
          const snap = await getDoc(portfolioRef);
          if (!snap.exists()) {
            await setDoc(portfolioRef, {
              balance: 10000.00,
              assets: {
                'm_slow': { shares: 0, averageBuyPrice: 0 },
                'm_medium': { shares: 0, averageBuyPrice: 0 },
                'm_fast': { shares: 0, averageBuyPrice: 0 }
              },
              lastRewardClaim: 0,
              pseudo: "",
              streak: 1
            });
          }
        };
        initPortfolio();

        const unsubPortfolio = onSnapshot(portfolioRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            // Rétrocompatibilité (Migration des anciens comptes vers m_medium)
            if (!data.assets) {
              data.assets = {
                'm_slow': { shares: 0, averageBuyPrice: 0 },
                'm_medium': { shares: data.shares || 0, averageBuyPrice: data.averageBuyPrice || 0 },
                'm_fast': { shares: 0, averageBuyPrice: 0 }
              };
            }
            setPortfolio(data);
            setIsLoading(false);
          }
        }, (error) => console.error("Erreur portfolio:", error));

        return () => {
          unsubscribers.forEach(unsub => unsub());
          unsubPortfolio();
        };
      }, [user]);

      // Calcul Valeur Totale pour Leaderboard
      const totalValueComputed = useMemo(() => {
        if (!portfolio || !portfolio.assets) return 0;
        let totalSharesValue = 0;
        for (const mId of MARKET_IDS) {
          if (portfolio.assets[mId] && markets[mId]) {
            totalSharesValue += portfolio.assets[mId].shares * markets[mId].price;
          }
        }
        return portfolio.balance + totalSharesValue;
      }, [portfolio, markets]);

      useEffect(() => {
        if (!user || !portfolio?.pseudo || Object.keys(markets).length < 3) return;
        const lbRef = doc(db, 'artifacts', appId, 'public', 'data', 'leaderboard', user.uid);
        setDoc(lbRef, {
          pseudo: portfolio.pseudo,
          totalValue: totalValueComputed,
          lastUpdated: Date.now()
        }, { merge: true }).catch(e => console.error("Erreur maj score:", e));
      }, [user, portfolio?.pseudo, totalValueComputed, markets]);

      useEffect(() => {
        if (!user) return;
        const lbCol = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
        const unsubLeaderboard = onSnapshot(lbCol, (snapshot) => {
          let data = [];
          snapshot.forEach(d => data.push(d.data()));
          data.sort((a, b) => b.totalValue - a.totalValue);
          setLeaderboard(data.slice(0, 50));
        });
        return () => unsubLeaderboard();
      }, [user]);

      // Compte à rebours du salaire journalier
      useEffect(() => {
        if (!portfolio) return;
        const updateTimer = () => {
          if (!portfolio.lastRewardClaim) {
            setTimeToReward(0);
            return;
          }
          const remaining = REWARD_COOLDOWN - (Date.now() - portfolio.lastRewardClaim);
          setTimeToReward(remaining > 0 ? remaining : 0);
        };
        updateTimer();
        const timerInterval = setInterval(updateTimer, 1000);
        return () => clearInterval(timerInterval);
      }, [portfolio?.lastRewardClaim]);

      // COMPTEUR DE MINAGE/STAKING PASSIF EN TEMPS RÉEL
      useEffect(() => {
        if (!user || isLoading) return;
        const interval = setInterval(() => {
          setStakingEarnings(prev => {
            if (prev >= MAX_STAKING_RESERVOIR) return MAX_STAKING_RESERVOIR;
            return parseFloat((prev + STAKING_RATE).toFixed(2));
          });
        }, 1000);
        return () => clearInterval(interval);
      }, [user, isLoading]);

      // Moteur de simulation (Market Maker Local pour les 3 marchés)
      useEffect(() => {
        if (!user) return;

        const intervalId = setInterval(async () => {
          const now = Date.now();
          
          for (const mId of MARKET_IDS) {
            const currentMarket = marketsRefState.current[mId];
            if (!currentMarket) continue;

            const isLeader = currentMarket.leaderId === user.uid;
            const leaderIsDead = (now - (currentMarket.leaderHeartbeat || 0)) > 5000;
            const mRef = doc(db, 'artifacts', appId, 'public', 'data', 'markets', mId);

            if (leaderIsDead && !isLeader) {
              await setDoc(mRef, { leaderId: user.uid, leaderHeartbeat: now }, { merge: true });
              continue; 
            }

            if (isLeader) {
              const config = MARKETS_CONFIG[mId];
              const timeSinceLastUpdate = now - currentMarket.lastUpdate;
              // Conversion du tickRate (0 = ~500ms, 1 = ~1000ms, 3 = ~2000ms)
              const targetDelay = config.tickRate === 0 ? 400 : (config.tickRate === 1 ? 900 : 1900);

              // Le sentiment diminue (revient vers 0) progressivement au fil du temps
              let newSentiment = (currentMarket.sentimentScore || 0) * 0.85; 
              if (Math.abs(newSentiment) < 0.1) newSentiment = 0;

              if (timeSinceLastUpdate > targetDelay) {
                let newTrend = currentMarket.trend * 0.92;
                let currentNews = currentMarket.news;
                let currentNewsType = currentMarket.newsType;

                newTrend += (Math.random() - 0.5) * config.vol;

                if (Math.random() < 0.05) {
                  const event = NEWS_EVENTS[Math.floor(Math.random() * NEWS_EVENTS.length)];
                  newTrend += event.impact; // Applique l'impact (même s'il est gris)
                  currentNews = event.text;
                  currentNewsType = event.isGrey ? 'grey' : (event.impact > 0 ? 'positive' : 'negative');
                }

                let newPrice = currentMarket.price + newTrend;
                
                if (newPrice <= 1.5) {
                  newPrice = 1.5;
                  newTrend = Math.abs(newTrend) + 1.0;
                }

                const newHistory = [...currentMarket.history, newPrice];
                if (newHistory.length > 50) newHistory.shift();

                try {
                  await setDoc(mRef, {
                    price: newPrice,
                    history: newHistory,
                    trend: newTrend,
                    sentimentScore: newSentiment,
                    news: currentNews,
                    newsType: currentNewsType,
                    lastUpdate: now,
                    leaderHeartbeat: now
                  }, { merge: true });
                } catch (e) {}
              } else {
                if (now - (currentMarket.leaderHeartbeat || 0) > 3000) {
                  try { 
                    await setDoc(mRef, { 
                      leaderHeartbeat: now,
                      sentimentScore: newSentiment // On met aussi à jour le sentiment même si pas de nouveau tick de prix
                    }, { merge: true }); 
                  } catch (e) {}
                }
              }
            }
          }
        }, 500); // Boucle générale toutes les 500ms

        return () => clearInterval(intervalId);
      }, [user?.uid]);

      // COLLECTE DE SALAIRE ET GESTION DE STREAK SUR FIREBASE
      const handleClaimReward = async () => {
        if (!user || !portfolio || timeToReward > 0) return;
        const portfolioRef = doc(db, 'artifacts', appId, 'users', user.uid, 'portfolio', 'state');
        
        const now = Date.now();
        const oneDayMs = 24 * 60 * 60 * 1000;
        const lastClaim = portfolio.lastRewardClaim || 0;
        
        let newStreak = portfolio.streak || 1;
        
        if (lastClaim > 0) {
          const delay = now - lastClaim;
          if (delay < oneDayMs * 2) {
            newStreak = Math.min(newStreak + 1, 7);
          } else {
            newStreak = 1;
          }
        } else {
          newStreak = 1;
        }

        const multiplier = 1 + (newStreak - 1) * 0.10;
        const finalSalary = Math.round(REWARD_AMOUNT * multiplier);

        playSound('claim');

        setPortfolio(prev => ({ 
          ...prev, 
          balance: prev.balance + finalSalary, 
          lastRewardClaim: now,
          streak: newStreak
        }));

        await setDoc(portfolioRef, { 
          balance: portfolio.balance + finalSalary, 
          lastRewardClaim: now,
          streak: newStreak
        }, { merge: true });
      };

      // RÉCOLTE DU MINAGE PASSIF
      const handleClaimStaking = async () => {
        if (!user || !portfolio || stakingEarnings <= 0) return;
        const portfolioRef = doc(db, 'artifacts', appId, 'users', user.uid, 'portfolio', 'state');

        const collectedAmount = stakingEarnings;
        setStakingEarnings(0); 

        playSound('claim');

        setPortfolio(prev => ({
          ...prev,
          balance: prev.balance + collectedAmount
        }));

        await setDoc(portfolioRef, {
          balance: portfolio.balance + collectedAmount
        }, { merge: true });
      };

      // --- LOGIQUE DE JEU DE LA ROULETTE DU CASINO ---
      const handleSpinRoulette = async () => {
        if (isSpinning || !user || !portfolio) return;
        if (rouletteBet <= 0 || rouletteBet > portfolio.balance) {
          setRouletteStatusMessage("Mise invalide ou solde insuffisant !");
          playSound('lose');
          return;
        }

        setIsSpinning(true);
        setRouletteWinnerNum(null);
        setRouletteWinnerColor(null);
        setRouletteStatusMessage("Roue en rotation...");

        let ticksCount = 0;
        const interval = setInterval(() => {
          playSound('tick');
          ticksCount++;
          if (ticksCount >= 12) {
            clearInterval(interval);
          }
        }, 120);

        setTimeout(async () => {
          const winningNumber = Math.floor(Math.random() * 37);
          let winningColor = 'red';
          
          if (winningNumber === 0) {
            winningColor = 'green';
          } else if (
            [2, 4, 6, 8, 10, 11, 13, 15, 17, 20, 22, 24, 26, 28, 29, 31, 33, 35].includes(winningNumber)
          ) {
            winningColor = 'black';
          }

          setRouletteWinnerNum(winningNumber);
          setRouletteWinnerColor(winningColor);

          const portfolioRef = doc(db, 'artifacts', appId, 'users', user.uid, 'portfolio', 'state');
          let winMultiplier = 0;
          let won = false;

          if (rouletteColor === winningColor) {
            won = true;
            winMultiplier = winningColor === 'green' ? 35 : 2;
          }

          let newBalance = portfolio.balance;
          if (won) {
            const earnings = rouletteBet * (winMultiplier - 1);
            newBalance += earnings;
            setRouletteStatusMessage(`Gagné ! Le numéro ${winningNumber} (${winningColor.toUpperCase()}) est sorti. +$${earnings.toFixed(2)}`);
            playSound('win');
          } else {
            newBalance -= rouletteBet;
            setRouletteStatusMessage(`Perdu ! Le numéro ${winningNumber} (${winningColor.toUpperCase()}) est sorti. -$${rouletteBet.toFixed(2)}`);
            playSound('lose');
          }

          setPortfolio(prev => ({ ...prev, balance: newBalance }));
          await setDoc(portfolioRef, { balance: newBalance }, { merge: true });
          setIsSpinning(false);
        }, 1600);
      };

      // TRADING D'ACTIONS (Frais 1% et pertes brutes x2)
      const handleTrade = async (type) => {
        const mId = activeMarketId;
        const currentMarket = markets[mId];
        
        if (!currentMarket || !portfolio || !user) return;

        const mRef = doc(db, 'artifacts', appId, 'public', 'data', 'markets', mId);
        const portfolioRef = doc(db, 'artifacts', appId, 'users', user.uid, 'portfolio', 'state');

        const currentPrice = currentMarket.price;
        let newBalance = portfolio.balance;
        
        const activeAssets = portfolio.assets?.[mId] || { shares: 0, averageBuyPrice: 0 };
        let newShares = activeAssets.shares;
        let newAverageBuyPrice = activeAssets.averageBuyPrice;
        
        let impactOnTrend = 0;

        // --- DIFFICULTÉ : Frais remis à 1% ---
        const feeRate = 0.01; 

        if (type === 'BUY') {
          const cost = currentPrice * (1 + feeRate);
          if (portfolio.balance >= cost) {
            newAverageBuyPrice = ((newShares * newAverageBuyPrice) + cost) / (newShares + 1);
            newBalance -= cost;
            newShares += 1;
            impactOnTrend = 0.5 * (MARKETS_CONFIG[mId].vol / 2.5); 
            playSound('claim');
          } else {
            playSound('lose');
            return;
          }
        } else if (type === 'SELL') {
          if (newShares > 0) {
            const gain = currentPrice * (1 - feeRate);
            
            // --- DIFFICULTÉ ACCRUE : Pertes brutes multipliées par 2 (CONSERVÉ) ---
            let penaltyLoss = 0;
            if (currentPrice < newAverageBuyPrice) {
              const rawLoss = newAverageBuyPrice - currentPrice;
              penaltyLoss = rawLoss; 
            }

            newBalance += (gain - penaltyLoss);
            newShares -= 1;
            impactOnTrend = -0.5 * (MARKETS_CONFIG[mId].vol / 2.5); 
            
            if (newShares === 0) {
              newAverageBuyPrice = 0;
            }

            if (penaltyLoss > 0) {
              playSound('lose'); 
            } else {
              playSound('win'); 
            }
          } else {
            playSound('lose');
            return;
          }
        }

        const newAssets = {
          ...portfolio.assets,
          [mId]: { shares: newShares, averageBuyPrice: newAverageBuyPrice }
        };

        setPortfolio({ ...portfolio, balance: newBalance, assets: newAssets });

        await setDoc(portfolioRef, { 
          balance: newBalance, 
          assets: newAssets 
        }, { merge: true });

        // Mise à jour du marché avec l'impact ET le signal de Sentiment
        const sentimentImpact = type === 'BUY' ? 3 : -3; // Impact fort pour se voir sur le front

        await setDoc(mRef, {
          trend: currentMarket.trend + impactOnTrend,
          sentimentScore: (currentMarket.sentimentScore || 0) + sentimentImpact,

                        <div className="w-full bg-zinc-900 rounded-full h-4 overflow-hidden relative border border-zinc-800">
                          <div 
                            className="bg-gradient-to-r from-emerald-500 to-teal-400 h-full transition-all duration-1000 ease-out" 
                            style={{ width: `${(stakingEarnings / MAX_STAKING_RESERVOIR) * 100}%` }}
                          />
                          <span className="absolute inset-0 flex items-center justify-center text-[10px] font-bold font-mono text-zinc-300">
                            {((stakingEarnings / MAX_STAKING_RESERVOIR) * 100).toFixed(0)}% rempli
                          </span>
                        </div>
                        <span className="font-mono text-xl font-extrabold text-emerald-400 w-24 text-right">
                          ${stakingEarnings.toFixed(2)}
                        </span>
                      </div>
                    </div>

                    <div className="space-y-3">
                      <p className="text-[10px] text-zinc-500 text-center">
                        Capacité maximale du réservoir : <strong>${MAX_STAKING_RESERVOIR.toFixed(2)}</strong>
                      </p>
                      
                      <button
                        onClick={handleClaimStaking}
                        disabled={stakingEarnings <= 0}
                        className={`w-full py-3.5 rounded-xl font-bold text-sm sm:text-base transition-all ${
                          stakingEarnings > 0 
                          ? 'bg-emerald-500 hover:bg-emerald-600 text-black shadow-lg active:scale-95 cursor-pointer' 
                          : 'bg-zinc-900 text-zinc-500 border border-zinc-800 cursor-not-allowed'
                        }`}
                      >
                        {stakingEarnings > 0 ? 'Récolter les gains accumulés' : 'Aucun gain disponible'}
                      </button>
                    </div>
                  </div>

                </div>

                {/* --- MODULE NOUVEAU: MINI JEU CASINO (LA ROULETTE) --- */}
                <div className="bg-[#121214] border border-amber-500/20 rounded-2xl p-5 sm:p-6 relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-amber-500 to-orange-500"></div>
                  
                  <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4 border-b border-zinc-800 pb-4">
                    <div className="flex items-center gap-2">
                      <Dices className="w-6 h-6 text-amber-400 animate-spin" style={{ animationDuration: '6s' }} />
                      <div>
                        <h3 className="text-lg font-bold text-amber-400">Mini-Casino : La Roulette</h3>
                        <p className="text-xs text-zinc-400">Tentez de multiplier vos liquidités instantanément !</p>
                      </div>
                    </div>
                    <div className="text-right">
                      <span className="text-xs text-zinc-500 block">Vos Liquidités</span>
                      <span className="font-mono text-base font-bold text-emerald-400">${portfolio.balance.toLocaleString('fr-FR', { minimumFractionDigits: 2 })}</span>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                    {/* Zone de paris */}
                    <div className="lg:col-span-7 space-y-4">
                      {/* 1. Sélection du montant */}
                      <div>
                        <label className="text-xs text-zinc-400 uppercase font-semibold tracking-wider block mb-2">Choisir la mise ($)</label>
                        <div className="grid grid-cols-5 gap-1 sm:gap-2">
                          {[50, 100, 500, 1000].map((val) => (
                            <button
                              key={val}
                              onClick={() => { playSound('tick'); setRouletteBet(val); }}
                              disabled={isSpinning}
                              className={`py-2 px-1 rounded-lg text-xs font-mono font-bold transition-all border ${
                                rouletteBet === val 
                                ? 'bg-amber-500/20 border-amber-500 text-amber-300' 
                                : 'bg-zinc-900 hover:bg-zinc-800 border-zinc-800 text-zinc-400'
                              }`}
                            >
                              ${val}
                            </button>
                          ))}
                          <button
                            onClick={() => { playSound('tick'); setRouletteBet(Math.floor(portfolio.balance)); }}
                            disabled={isSpinning}
                            className={`py-2 px-1 rounded-lg text-[10px] font-bold uppercase transition-all border ${
                              rouletteBet === Math.floor(portfolio.balance)
                              ? 'bg-amber-500/20 border-amber-500 text-amber-300' 
                              : 'bg-zinc-900 hover:bg-zinc-800 border-zinc-800 text-zinc-400'
                            }`}
                          >
                            All-in
                          </button>
                        </div>
                      </div>

                      {/* Input de mise manuelle */}
                      <div className="flex items-center bg-zinc-950 px-3 py-1 rounded-xl border border-zinc-800">
                        <span className="text-zinc-500 text-sm mr-2">$</span>
                        <input
                          type="number"
                          disabled={isSpinning}
                          value={rouletteBet}
                          onChange={(e) => {
                            const val = Math.max(0, parseInt(e.target.value) || 0);
                            setRouletteBet(val);
                          }}
                          className="bg-transparent text-white font-mono font-bold text-sm focus:outline-none w-full"
                          min="1"
                        />
                      </div>

                      {/* 2. Sélection de la cible de pari */}
                      <div>
                        <label className="text-xs text-zinc-400 uppercase font-semibold tracking-wider block mb-2">Parier sur la couleur</label>
                        <div className="grid grid-cols-3 gap-3">
                          <button
                            onClick={() => { playSound('tick'); setRouletteColor('red'); }}
                            disabled={isSpinning}
                            className={`py-3 rounded-xl font-bold text-xs flex flex-col items-center gap-1 border transition-all ${
                              rouletteColor === 'red'
                              ? 'bg-rose-600 text-white border-white scale-105 shadow-lg shadow-rose-900/30'
                              : 'bg-[#1e1114] text-rose-400 border-rose-950 hover:bg-[#251418]'
                            }`}
                          >
                            <span className="w-3 h-3 bg-rose-600 rounded-full border border-white"></span>
                            Rouge (x2)
                          </button>

                          <button
                            onClick={() => { playSound('tick'); setRouletteColor('black'); }}
                            disabled={isSpinning}
                            className={`py-3 rounded-xl font-bold text-xs flex flex-col items-center gap-1 border transition-all ${
                              rouletteColor === 'black'
                              ? 'bg-zinc-800 text-white border-white scale-105 shadow-lg shadow-black'
                              : 'bg-[#111113] text-zinc-400 border-zinc-900 hover:bg-[#18181b]'
                            }`}
                          >
                            <span className="w-3 h-3 bg-zinc-950 rounded-full border border-zinc-700"></span>
                            Noir (x2)
                          </button>

                          <button
                            onClick={() => { playSound('tick'); setRouletteColor('green'); }}
                            disabled={isSpinning}
                            className={`py-3 rounded-xl font-bold text-xs flex flex-col items-center gap-1 border transition-all ${
                              rouletteColor === 'green'
                              ? 'bg-emerald-600 text-white border-white scale-105 shadow-lg shadow-emerald-950/30'
                              : 'bg-[#0f1915] text-emerald-400 border-emerald-950 hover:bg-[#13211b]'
                            }`}
                          >
                            <span className="w-3 h-3 bg-emerald-600 rounded-full border border-white animate-pulse"></span>
                            Vert / Le 0 (x35)
                          </button>
                        </div>
                      </div>
                    </div>

                    {/* Zone de tirage visuel */}
                    <div className="lg:col-span-5 bg-zinc-950 rounded-xl p-4 flex flex-col justify-between items-center border border-zinc-800 relative">
                      <div className="text-center w-full">
                        <p className="text-[10px] uppercase font-extrabold tracking-widest text-zinc-500 mb-1">RÉSOLUTION ROULETTE</p>
                        
                        {/* Roue roulette simplifiée animée */}
                        <div className="h-32 w-full flex items-center justify-center relative overflow-hidden bg-zinc-900 border border-zinc-800 rounded-lg my-3">
                          {isSpinning ? (
                            <div className="flex gap-1 animate-pulse">
                              <span className="w-4 h-4 rounded-full bg-rose-500 animate-bounce" style={{ animationDelay: '0.1s' }}></span>
                              <span className="w-4 h-4 rounded-full bg-zinc-100 animate-bounce" style={{ animationDelay: '0.2s' }}></span>
                              <span className="w-4 h-4 rounded-full bg-emerald-500 animate-bounce" style={{ animationDelay: '0.3s' }}></span>
                            </div>
                          ) : rouletteWinnerNum !== null ? (
                            <div className="flex flex-col items-center animate-scaleIn">
                              <div className={`w-16 h-16 rounded-full flex items-center justify-center font-mono text-2xl font-black border-2 shadow-2xl ${
                                rouletteWinnerColor === 'red' ? 'bg-rose-600 border-rose-400 shadow-rose-900/40 text-white' : 
                                rouletteWinnerColor === 'black' ? 'bg-zinc-800 border-zinc-600 shadow-black text-white' : 
                                'bg-emerald-600 border-emerald-400 shadow-emerald-900/40 text-white'
                              }`}>
                                {rouletteWinnerNum}
                              </div>
                              <span className="text-[10px] uppercase font-bold text-zinc-400 mt-2">
                                Couleur : {rouletteWinnerColor === 'red' ? 'Rouge' : rouletteWinnerColor === 'black' ? 'Noir' : 'Vert (Zéro)'}
                              </span>
                            </div>
                          ) : (
                            <p className="text-xs text-zinc-500 font-mono italic">Prêt pour la rotation</p>
                          )}
                        </div>
                      </div>

                      {/* Message statut */}
                      <div className="text-center mb-4">
                        <p className={`text-xs font-semibold leading-relaxed px-2 py-1.5 rounded-lg ${
                          rouletteStatusMessage.includes("Gagné") ? 'text-emerald-400 bg-emerald-500/10' :
                          rouletteStatusMessage.includes("Perdu") ? 'text-rose-400 bg-rose-500/10' :
                          'text-zinc-300'
                        }`}>
                          {rouletteStatusMessage}
                        </p>
                      </div>

                      <button
                        onClick={handleSpinRoulette}
                        disabled={isSpinning || portfolio.balance < rouletteBet || rouletteBet <= 0}
                        className={`w-full py-3.5 rounded-xl font-bold text-sm sm:text-base transition-all ${
                          !isSpinning && portfolio.balance >= rouletteBet && rouletteBet > 0
                          ? 'bg-amber-500 hover:bg-amber-600 text-black shadow-lg shadow-amber-950/20 active:scale-95 cursor-pointer' 
                          : 'bg-zinc-900 text-zinc-500 border border-zinc-800 cursor-not-allowed'
                        }`}
                      >
                        {isSpinning ? "Lancement..." : "Faire tourner la roue"}
                      </button>
                    </div>
                  </div>
                </div>

              </div>
            )}

            {activeTab === 'leaderboard' && (
              <div className="max-w-2xl mx-auto mt-4">
                {!portfolio?.pseudo ? (
                  <div className="bg-[#121214] border border-zinc-800 rounded-2xl p-6 sm:p-8 shadow-xl text-center">
                    <Trophy className="w-16 h-16 text-amber-500 mx-auto mb-5" />
                    <h3 className="text-2xl font-bold mb-3">Rejoindre le Classement</h3>
                    <p className="text-zinc-400 text-xs sm:text-sm mb-6 max-w-md mx-auto">
                      Pour apparaître dans le top des meilleurs traders mondiaux, choisis un pseudo unique. Ce choix est définitif.
                    </p>
                    
                    <div className="flex flex-col sm:flex-row gap-3 max-w-sm mx-auto">
                      <input 
                        type="text" 
                        maxLength="15" 
                        value={pseudoInput} 
                        onChange={e => setPseudoInput(e.target.value)} 
                        placeholder="Ton pseudo..." 
                        className="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 font-medium" 
                      />
                      <button 
                        onClick={handleSetPseudo} 
                        disabled={!pseudoInput.trim()}
                        className="bg-amber-500 hover:bg-amber-600 disabled:opacity-50 disabled:hover:bg-amber-500 text-black font-bold py-3 px-6 rounded-xl text-sm transition-colors whitespace-nowrap"
                      >
                        Valider
                      </button>
                    </div>
                  </div>
                ) : (
                  <div className="bg-[#121214] border border-zinc-800 rounded-2xl shadow-xl overflow-hidden">
                    <div className="p-4 sm:p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/30">
                      <h3 className="text-base sm:text-xl font-bold flex items-center gap-2">
                        <Trophy className="text-amber-500 w-5 h-5 sm:w-6 sm:h-6"/> 
                        Top 50 Mondial
                      </h3>
                      <div className="text-right text-xs">
                        <p className="text-zinc-500">Pseudo</p>
                        <p className="font-bold text-amber-400 truncate max-w-[100px] sm:max-w-[150px]">{portfolio.pseudo}</p>
                      </div>
                    </div>
                    
                    <div className="p-2 max-h-[60vh] overflow-y-auto">
                      {leaderboard.length === 0 ? (
                        <p className="text-zinc-500 text-center py-10 text-sm">Calcul des scores en cours...</p>
                      ) : (
                        <div className="space-y-1">
                          {leaderboard.map((player, index) => {
                            const profit = player.totalValue - 10000;
                            const isMe = player.pseudo === portfolio.pseudo;
                            
                            return (
                              <div key={index} className={`flex justify-between items-center p-3 sm:p-4 rounded-xl transition-colors ${isMe ? 'bg-amber-500/10 border border-amber-500/20' : 'hover:bg-zinc-900/50 border border-transparent'}`}>
                                <div className="flex items-center gap-2 sm:gap-4 overflow-hidden">
                                  <span className={`font-mono font-bold text-sm sm:text-base w-6 sm:w-8 shrink-0 text-center ${index === 0 ? 'text-amber-400' : index === 1 ? 'text-zinc-300' : index === 2 ? 'text-amber-700' : 'text-zinc-600'}`}>
                                    #{index + 1}
                                  </span>
                                  <span className={`font-bold text-xs sm:text-sm truncate ${isMe ? 'text-amber-400' : 'text-zinc-200'}`}>
                                    {player.pseudo}
                                  </span>
                                </div>
                                <div className="text-right shrink-0 ml-2">
                                  <p className="font-mono font-bold text-xs sm:text-sm text-zinc-100">${player.totalValue.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</p>
                                  <p className={`text-[10px] sm:text-xs font-mono font-medium ${profit >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                                    {profit >= 0 ? '+' : ''}{profit.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}$
                                  </p>
                                </div>
                              </div>
                            )
                          })}
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            )}

          </main>

          {/* FENÊTRE MODALE D'EXPLICATION (INFO) OPTIMISÉE POUR TÉLÉPHONNE */}
          {showInfo && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/85 backdrop-blur-sm">
              <div className="bg-[#121214] border border-zinc-700 rounded-2xl p-5 sm:p-6 max-w-lg w-full shadow-2xl relative max-h-[85vh] overflow-y-auto">
                <button onClick={() => setShowInfo(false)} className="absolute top-4 right-4 text-zinc-400 hover:text-white transition-colors">
                  <X className="w-5 h-5" />
                </button>
                <h2 className="text-xl sm:text-2xl font-bold mb-4 flex items-center gap-2 text-emerald-400">
                  <Info className="w-5 h-5 sm:w-6 sm:h-6" /> Comment jouer ?
                </h2>

                <div className="space-y-4 text-zinc-300 text-xs sm:text-sm">
                  <p>Bienvenue sur <strong>TRADEX.LIVE</strong>, un simulateur de bourse multijoueur synchrone en temps réel.</p>

                  <div className="bg-zinc-900/50 p-3 sm:p-4 rounded-xl border border-zinc-800">
                    <h3 className="font-bold text-white mb-1.5 flex items-center gap-2"><LineChart className="w-4 h-4 text-emerald-400"/> Bourse & Difficulté Réaliste</h3>
                    <ul className="list-disc pl-5 space-y-1 text-zinc-400">
                      <li><strong>Liquidités :</strong> Votre solde disponible en USD pour effectuer vos investissements.</li>
                      <li><strong>Achat / Vente :</strong> Les frais de transaction sont de <strong>1%</strong>.</li>
                      <li><strong>Pertes Asymétriques (x2) :</strong> Si vous revendez à perte sous votre prix moyen d'achat, vos pertes brutes sont multipliées par 2. Les gains sont normaux.</li>
                      <li><strong>3 Marchés :</strong> Vous pouvez naviguer entre 3 marchés différents. Observez-les pour comprendre leur dynamique et diversifiez votre portefeuille !</li>
                      <li><strong>Actualités mystères :</strong> Certaines actualités apparaissent en gris. À vous de deviner si la nouvelle est bonne ou mauvaise pour l'entreprise.</li>
                    </ul>
                  </div>

                  <div className="bg-zinc-900/50 p-3 sm:p-4 rounded-xl border border-zinc-800">
                    <h3 className="font-bold text-white mb-1.5 flex items-center gap-2"><Dices className="w-4 h-4 text-amber-400"/> Casino & Roulette</h3>
                    <ul className="list-disc pl-5 space-y-1 text-zinc-400">
                      <li><strong>Rouge / Noir :</strong> Double votre mise (2x).</li>
                      <li><strong>Vert (0) :</strong> Multiplie par 35 votre mise (35x).</li>
                    </ul>
                  </div>

                  <div className="bg-zinc-900/50 p-3 sm:p-4 rounded-xl border border-zinc-800">
                    <h3 className="font-bold text-white mb-1.5 flex items-center gap-2"><Gift className="w-4 h-4 text-indigo-400"/> Bonus (Rétention & Salaire)</h3>
                    <ul className="list-disc pl-5 space-y-1 text-zinc-400">
                      <li><strong>Série de Jours :</strong> Obtenez de l'argent quotidiennement. Conserver votre série consécutive augmente vos bonus de récompense jusqu'à <strong>+70%</strong> le 7ème jour.</li>
                      <li><strong>Générateur passif :</strong> Restez actif sur le site pour produire <strong>$0.05 par seconde</strong>. Récoltez votre butin avant d'atteindre le seuil maximal de <strong>$50.00</strong>.</li>
                    </ul>
                  </div>

                  <div className="bg-zinc-900/50 p-3 sm:p-4 rounded-xl border border-zinc-800">
                    <h3 className="font-bold text-white mb-1.5 flex items-center gap-2"><Trophy className="w-4 h-4 text-amber-500"/> Classement mondial</h3>
                    <p className="text-zinc-400">
                      Déterminez votre pseudonyme et comparez vos performances avec la communauté. Votre classement est basé sur votre <strong>Valeur Totale</strong> (Liquidités + Valeur estimée des actions sur les 3 marchés).
                    </p>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* BARRE DE NAVIGATION INFÉRIEURE MOBILE */}
          <nav className="fixed bottom-0 left-0 right-0 bg-[#09090b]/95 backdrop-blur-lg border-t border-zinc-800 z-50">
            <div className="max-w-md mx-auto flex justify-between px-6 py-3">
              <button 
                onClick={() => setActiveTab('trade')} 
                className={`flex flex-col items-center gap-1 transition-colors ${activeTab === 'trade' ? 'text-emerald-400' : 'text-zinc-500 hover:text-zinc-300'}`}
              >
                <LineChart className="w-5.5 h-5.5" />
                <span className="text-[9px] font-bold uppercase tracking-wider">Bourse</span>
              </button>
              
              <button 
                onClick={() => setActiveTab('rewards')} 
                className={`flex flex-col items-center gap-1 transition-colors relative ${activeTab === 'rewards' ? 'text-indigo-400' : 'text-zinc-500 hover:text-zinc-300'}`}
              >
                {(timeToReward === 0 || stakingEarnings > 0) && (
                  <span className="absolute top-0.5 right-1 w-2 h-2 bg-indigo-500 rounded-full border-2 border-[#09090b]"></span>
                )}
                <Gift className="w-5.5 h-5.5" />
                <span className="text-[9px] font-bold uppercase tracking-wider">Bonus</span>
              </button>
              
              <button 
                onClick={() => setActiveTab('leaderboard')} 
                className={`flex flex-col items-center gap-1 transition-colors ${activeTab === 'leaderboard' ? 'text-amber-400' : 'text-zinc-500 hover:text-zinc-300'}`}
              >
                <Trophy className="w-5.5 h-5.5" />
                <span className="text-[9px] font-bold uppercase tracking-wider">Top 50</span>
              </button>
            </div>
          </nav>

        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
    </script>
</body>
</html>
