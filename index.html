<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Simulator</title>
    
    <!-- Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel pour lire le code React (JSX) directement dans le navigateur -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Import Map pour charger les bibliothèques sans erreur -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
            "lucide-react": "https://esm.sh/lucide-react@0.330.0"
        }
    }
    </script>

    <!-- Injection de tes clés Firebase (sans toucher au code en dessous) -->
    <script>
        window.__firebase_config = JSON.stringify({
            apiKey: "AIzaSyDct8USnQM78QdVHxmg4P94fejPacfc6RA",
            authDomain: "aurabienveillance.firebaseapp.com",
            projectId: "aurabienveillance",
            storageBucket: "aurabienveillance.firebasestorage.app",
            messagingSenderId: "320221952933",
            appId: "1:320221952933:web:55b970e848d652c9ab464c",
            measurementId: "G-4XZJNZ7CSW"
        });
        window.__app_id = "aurabienveillance-trading";
    </script>
</head>
<body class="bg-[#09090b] text-zinc-100 min-h-screen">
    
    <!-- Conteneur principal du site -->
    <div id="root"></div>

    <!-- DÉBUT DE TON CODE INTACT -->
    <script type="text/babel" data-type="module">
    import { createRoot } from 'react-dom/client';
    
    import React, { useState, useEffect, useRef, useMemo } from 'react';
    import { initializeApp } from 'firebase/app';
    import { 
      getAuth, 
      signInAnonymously, 
      signInWithCustomToken, 
      onAuthStateChanged 
    } from 'firebase/auth';
    import { 
      getFirestore, 
      doc, 
      setDoc, 
      getDoc, 
      onSnapshot,
      collection
    } from 'firebase/firestore';
    import { 
      TrendingUp, 
      TrendingDown, 
      Activity, 
      AlertCircle, 
      DollarSign, 
      Briefcase,
      Zap,
      Globe,
      Users,
      Gift,
      LineChart, /* <-- NOUVEAU: Icone onglet Trade */
      Trophy     /* <-- NOUVEAU: Icone onglet Classement */
    } from 'lucide-react';

    // --- INITIALISATION FIREBASE ---
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    // --- PARAMÈTRES DU JEU ---
    const REWARD_COOLDOWN = 24 * 60 * 60 * 1000; // 24 heures en millisecondes
    const REWARD_AMOUNT = 500; // Montant du bonus journalier

    // --- ACTUALITÉS ALÉATOIRES ---
    const NEWS_EVENTS = [
      { text: "Elon Musk tweete un mème sur l'entreprise.", impact: 15 },
      { text: "Faille de sécurité majeure découverte dans le système.", impact: -20 },
      { text: "Nouveau partenariat stratégique avec un géant de la tech.", impact: 12 },
      { text: "Rumeurs insistantes de faillite imminente.", impact: -25 },
      { text: "Bénéfices records annoncés ce trimestre !", impact: 18 },
      { text: "Le PDG démissionne soudainement.", impact: -15 },
      { text: "Adoption massive de la technologie par le grand public.", impact: 10 },
      { text: "Un concurrent lance un produit nettement supérieur.", impact: -12 },
      { text: "L'entreprise achète pour 1 milliard de Bitcoin.", impact: 8 },
      { text: "Enquête du régulateur financier ouverte aujourd'hui.", impact: -18 },
    ];

    // --- COMPOSANT GRAPHIQUE SVG SUR MESURE ---
    const SparklineChart = ({ data, isPositive, averageBuyPrice, sharesCount }) => {
      const containerRef = useRef(null);
      const [dimensions, setDimensions] = useState({ width: 0, height: 0 });

      useEffect(() => {
        const updateSize = () => {
          if (containerRef.current) {
            setDimensions({
              width: containerRef.current.offsetWidth,
              height: containerRef.current.offsetHeight
            });
          }
        };
        window.addEventListener('resize', updateSize);
        updateSize();
        return () => window.removeEventListener('resize', updateSize);
      }, []);

      const { width, height } = dimensions;

      const chartStats = useMemo(() => {
        if (!data || data.length === 0 || width === 0) return null;
        
        let minVal = Math.min(...data);
        let maxVal = Math.max(...data);
        
        // On adapte l'échelle si le joueur a des actions pour toujours voir sa ligne d'achat
        if (sharesCount > 0 && averageBuyPrice) {
          minVal = Math.min(minVal, averageBuyPrice);
          maxVal = Math.max(maxVal, averageBuyPrice);
        }

        minVal *= 0.99; // Marge basse
        maxVal *= 1.01; // Marge haute
        const range = maxVal - minVal || 1;

        const points = data.map((val, index) => {
          const x = (index / (data.length - 1)) * width;
          const y = height - ((val - minVal) / range) * height;
          return `${x},${y}`;
        });

        return {
          path: `M ${points.join(' L ')}`,
          minVal,
          maxVal,
          range
        };
      }, [data, width, height, averageBuyPrice, sharesCount]);

      const color = isPositive ? '#10b981' : '#f43f5e'; // Emerald ou Rose

      return (
        <div ref={containerRef} className="w-full h-full relative overflow-hidden">
          {width > 0 && chartStats && (
            <svg width={width} height={height} className="overflow-visible">
              <defs>
                <linearGradient id="gradient" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0%" stopColor={color} stopOpacity="0.3" />
                  <stop offset="100%" stopColor={color} stopOpacity="0.0" />
                </linearGradient>
              </defs>
              
              {/* Remplissage sous la courbe */}
              <path
                d={`${chartStats.path} L ${width},${height} L 0,${height} Z`}
                fill="url(#gradient)"
                className="transition-all duration-300 ease-linear"
              />
              
              {/* Ligne principale */}
              <path
                d={chartStats.path}
                fill="none"
                stroke={color}
                strokeWidth="3"
                strokeLinejoin="round"
                strokeLinecap="round"
                className="transition-all duration-300 ease-linear"
                style={{ filter: `drop-shadow(0 0 8px ${color}88)` }}
              />
              
              {/* Ligne d'achat du joueur (pointillés) */}
              {sharesCount > 0 && averageBuyPrice > 0 && (
                <g className="transition-all duration-500 ease-in-out">
                  <line
                    x1="0"
                    y1={height - ((averageBuyPrice - chartStats.minVal) / chartStats.range) * height}
                    x2={width}
                    y2={height - ((averageBuyPrice - chartStats.minVal) / chartStats.range) * height}
                    stroke="#a1a1aa" // zinc-400
                    strokeWidth="2"
                    strokeDasharray="8,6"
                    className="opacity-70"
                  />
                  <rect 
                    x="10" 
                    y={height - ((averageBuyPrice - chartStats.minVal) / chartStats.range) * height - 24} 
                    width="80" 
                    height="20" 
                    rx="4" 
                    fill="#27272a" 
                    className="opacity-90"
                  />
                  <text
                    x="16"
                    y={height - ((averageBuyPrice - chartStats.minVal) / chartStats.range) * height - 10}
                    fill="#a1a1aa"
                    fontSize="11"
                    fontWeight="bold"
                    fontFamily="monospace"
                  >
                    ACHAT: ${averageBuyPrice.toFixed(1)}
                  </text>
                </g>
              )}

              {/* Point clignotant actuel */}
              <circle
                 cx={width}
                 cy={height - ((data[data.length - 1] - chartStats.minVal) / chartStats.range) * height}
                 r="5"
                 fill={color}
                 className="animate-pulse"
                 style={{ filter: `drop-shadow(0 0 10px ${color})` }}
              />
            </svg>
          )}
        </div>
      );
    };

    // --- COMPOSANT PRINCIPAL ---
    function App() {
      const [user, setUser] = useState(null);
      const [portfolio, setPortfolio] = useState(null);
      const [market, setMarket] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      
      const [onlineCount, setOnlineCount] = useState(1);
      const [timeToReward, setTimeToReward] = useState(0);

      // --- NOUVEAUX ÉTATS (NAVIGATION ET LEADERBOARD) ---
      const [activeTab, setActiveTab] = useState('trade'); // 'trade', 'rewards', 'leaderboard'
      const [leaderboard, setLeaderboard] = useState([]);
      const [pseudoInput, setPseudoInput] = useState('');

      // Garder une référence temps réel du marché pour éviter de recréer l'intervalle de mise à jour
      const marketRefState = useRef(market);
      useEffect(() => {
        marketRefState.current = market;
      }, [market]);

      // Authentification et Initialisation
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              try {
                await signInWithCustomToken(auth, __initial_auth_token);
              } catch (tokenError) {
                console.warn("Le jeton personnalisé ne correspond pas au projet, basculement en mode anonyme.");
                await signInAnonymously(auth);
              }
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("Erreur d'authentification:", error);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
        });
        return () => unsubscribe();
      }, []);

      // Gestion de la Présence (Joueurs en ligne)
      useEffect(() => {
        if (!user) return;

        const updatePresence = async () => {
          const presenceRef = doc(db, 'artifacts', appId, 'public', 'data', 'online_users', user.uid);
          try {
            await setDoc(presenceRef, { lastActive: Date.now() }, { merge: true });
          } catch (error) {}
        };

        updatePresence();
        const presenceInterval = setInterval(updatePresence, 15000);

        const onlineUsersRef = collection(db, 'artifacts', appId, 'public', 'data', 'online_users');
        const unsubPresence = onSnapshot(onlineUsersRef, (snapshot) => {
          const now = Date.now();
          let count = 0;
          snapshot.forEach(doc => {
            if (now - doc.data().lastActive < 30000) count++;
          });
          setOnlineCount(Math.max(1, count));
        }, (error) => console.error("Erreur lecture présence:", error));

        return () => {
          clearInterval(presenceInterval);
          unsubPresence();
        };
      }, [user]);

      // Chargement des données Firestore (Portfolio et Marché)
      useEffect(() => {
        if (!user) return;

        const marketRef = doc(db, 'artifacts', appId, 'public', 'data', 'market', 'global');
        const portfolioRef = doc(db, 'artifacts', appId, 'users', user.uid, 'portfolio', 'state');

        // Setup initial du marché si inexistant
        const initMarket = async () => {
          const snap = await getDoc(marketRef);
          if (!snap.exists()) {
            await setDoc(marketRef, {
              price: 100.00,
              history: Array(40).fill(100.00),
              trend: 0,
              news: "Lancement du marché Tradex.",
              newsType: 'neutral',
              lastUpdate: Date.now(),
              leaderId: user.uid,
              leaderHeartbeat: Date.now()
            });
          }
        };
        initMarket();

        // Setup initial du portfolio si inexistant
        const initPortfolio = async () => {
          const snap = await getDoc(portfolioRef);
          if (!snap.exists()) {
            await setDoc(portfolioRef, {
              balance: 10000.00,
              shares: 0,
              averageBuyPrice: 0,
              lastRewardClaim: 0,
              pseudo: "" // NOUVEAU: champ pseudo initialisé vide
            });
          }
        };
        initPortfolio();

        // Écouteurs temps réel
        const unsubMarket = onSnapshot(marketRef, (docSnap) => {
          if (docSnap.exists()) setMarket(docSnap.data());
        }, (error) => console.error("Erreur market:", error));

        const unsubPortfolio = onSnapshot(portfolioRef, (docSnap) => {
          if (docSnap.exists()) {
            setPortfolio(docSnap.data());
            setIsLoading(false);
          }
        }, (error) => console.error("Erreur portfolio:", error));

        return () => {
          unsubMarket();
          unsubPortfolio();
        };
      }, [user]);

      // --- NOUVEAU : ENREGISTRER LE SCORE DU JOUEUR DANS LE CLASSEMENT PUBLIC ---
      useEffect(() => {
        if (!user || !portfolio || !market || !portfolio.pseudo) return;
        
        // Pousse le score actuel vers la collection publique
        const totalValue = portfolio.balance + (portfolio.shares * market.price);
        const lbRef = doc(db, 'artifacts', appId, 'public', 'data', 'leaderboard', user.uid);
        
        setDoc(lbRef, {
          pseudo: portfolio.pseudo,
          totalValue: totalValue,
          lastUpdated: Date.now()
        }, { merge: true }).catch(e => console.error("Erreur maj score:", e));
      }, [user, portfolio?.balance, portfolio?.shares, portfolio?.pseudo, market?.price]);

      // --- NOUVEAU : LIRE LE CLASSEMENT PUBLIC ---
      useEffect(() => {
        if (!user) return;
        const lbCol = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
        const unsubLeaderboard = onSnapshot(lbCol, (snapshot) => {
          let data = [];
          snapshot.forEach(d => data.push(d.data()));
          // Tri en mémoire (pour éviter les erreurs d'index Firestore)
          data.sort((a, b) => b.totalValue - a.totalValue);
          setLeaderboard(data.slice(0, 50)); // Top 50 uniquement
        });
        return () => unsubLeaderboard();
      }, [user]);


      // Compte à rebours du bonus
      useEffect(() => {
        if (!portfolio) return;
        
        const updateTimer = () => {
          if (!portfolio.lastRewardClaim) {
            setTimeToReward(0);
            return;
          }
          const remaining = REWARD_COOLDOWN - (Date.now() - portfolio.lastRewardClaim);
          setTimeToReward(remaining > 0 ? remaining : 0);
        };

        updateTimer();
        const timerInterval = setInterval(updateTimer, 1000);
        return () => clearInterval(timerInterval);
      }, [portfolio?.lastRewardClaim]);


      // Moteur de simulation (Market Maker Local) lié uniquement au cycle de vie de l'utilisateur
      useEffect(() => {
        if (!user) return;

        const intervalId = setInterval(async () => {
          const currentMarket = marketRefState.current;
          if (!currentMarket) return;

          const marketRef = doc(db, 'artifacts', appId, 'public', 'data', 'market', 'global');
          const now = Date.now();
          
          const isLeader = currentMarket.leaderId === user.uid;
          const leaderIsDead = (now - (currentMarket.leaderHeartbeat || 0)) > 5000;

          // Système d'élection
          if (leaderIsDead && !isLeader) {
            await setDoc(marketRef, { leaderId: user.uid, leaderHeartbeat: now }, { merge: true });
            return; 
          }

          if (isLeader && (now - currentMarket.lastUpdate > 1500)) {
            let newTrend = currentMarket.trend * 0.95;
            let currentNews = currentMarket.news;
            let currentNewsType = currentMarket.newsType;

            newTrend += (Math.random() - 0.5) * 1.5;

            if (Math.random() < 0.03) {
              const event = NEWS_EVENTS[Math.floor(Math.random() * NEWS_EVENTS.length)];
              newTrend += event.impact;
              currentNews = event.text;
              currentNewsType = event.impact > 0 ? 'positive' : 'negative';
            }

            let newPrice = currentMarket.price + newTrend;
            
            if (newPrice <= 1.5) {
              newPrice = 1.5;
              newTrend = Math.abs(newTrend) + 1.0;
            }

            const newHistory = [...currentMarket.history, newPrice];
            if (newHistory.length > 50) newHistory.shift();

            try {
              await setDoc(marketRef, {
                price: newPrice,
                history: newHistory,
                trend: newTrend,
                news: currentNews,
                newsType: currentNewsType,
                lastUpdate: now,
                leaderHeartbeat: now
              }, { merge: true });
            } catch (e) {}
          } else if (isLeader) {
            if (now - (currentMarket.leaderHeartbeat || 0) > 3000) {
              try {
                await setDoc(marketRef, { leaderHeartbeat: now }, { merge: true });
              } catch (e) {}
            }
          }
        }, 1000);

        return () => clearInterval(intervalId);
      }, [user?.uid]);


      const handleClaimReward = async () => {
        if (!user || !portfolio || timeToReward > 0) return;
        const portfolioRef = doc(db, 'artifacts', appId, 'users', user.uid, 'portfolio', 'state');
        setPortfolio(prev => ({ ...prev, balance: prev.balance + REWARD_AMOUNT, lastRewardClaim: Date.now() }));
        await setDoc(portfolioRef, { 
          balance: portfolio.balance + REWARD_AMOUNT, 
          lastRewardClaim: Date.now() 
        }, { merge: true });
      };

      const handleTrade = async (type) => {
        if (!market || !portfolio || !user) return;

        const marketRef = doc(db, 'artifacts', appId, 'public', 'data', 'market', 'global');
        const portfolioRef = doc(db, 'artifacts', appId, 'users', user.uid, 'portfolio', 'state');

        const currentPrice = market.price;
        let newBalance = portfolio.balance;
        let newShares = portfolio.shares;
        let newAverageBuyPrice = portfolio.averageBuyPrice || 0;
        let impactOnTrend = 0;

        if (type === 'BUY') {
          if (portfolio.balance >= currentPrice) {
            newAverageBuyPrice = ((portfolio.shares * newAverageBuyPrice) + currentPrice) / (portfolio.shares + 1);
            newBalance -= currentPrice;
            newShares += 1;
            impactOnTrend = 2;
          } else return;
        } else if (type === 'SELL') {
          if (portfolio.shares > 0) {
            newBalance += currentPrice;
            newShares -= 1;
            impactOnTrend = -2;
            if (newShares === 0) newAverageBuyPrice = 0;
          } else return;
        }

        setPortfolio({ ...portfolio, balance: newBalance, shares: newShares, averageBuyPrice: newAverageBuyPrice });

        await setDoc(portfolioRef, { 
          balance: newBalance, 
          shares: newShares, 
          averageBuyPrice: newAverageBuyPrice 
        }, { merge: true });

        await setDoc(marketRef, {
          trend: market.trend + impactOnTrend,
          lastUpdate: Date.now()
        }, { merge: true });
      };

      // --- NOUVEAU : Fonction pour enregistrer son pseudo ---
      const handleSetPseudo = async () => {
        if (!user || !pseudoInput.trim()) return;
        const portfolioRef = doc(db, 'artifacts', appId, 'users', user.uid, 'portfolio', 'state');
        await setDoc(portfolioRef, { pseudo: pseudoInput.trim() }, { merge: true });
      };

      const formatTime = (ms) => {
        if (ms <= 0) return "Disponible !";
        const totalSeconds = Math.floor(ms / 1000);
        const h = Math.floor(totalSeconds / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60);
        const s = totalSeconds % 60;
        return `${h}h ${m}m ${s}s`;
      };


      if (isLoading || !market) {
        return (
          <div className="min-h-screen bg-[#09090b] flex items-center justify-center text-emerald-500 font-mono">
            <Activity className="animate-spin w-8 h-8 mr-3" /> Initialisation du Terminal...
          </div>
        );
      }

      const isPositiveTrend = market.history[market.history.length - 1] >= market.history[market.history.length - 2];
      const priceDiff = market.price - market.history[0];
      const percentChange = (priceDiff / market.history[0]) * 100;
      
      const totalValue = portfolio.balance + (portfolio.shares * market.price);

      return (
        <div className="min-h-screen bg-[#09090b] text-zinc-100 font-sans selection:bg-emerald-500/30 pb-24">
          
          <header className="border-b border-zinc-800 bg-[#09090b]/80 backdrop-blur-md sticky top-0 z-40">
            <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <Globe className="w-6 h-6 text-emerald-400" />
                <h1 className="text-xl font-bold tracking-tight">TRADEX<span className="text-emerald-500">.LIVE</span></h1>
              </div>
              
              <div className="flex gap-6 text-sm items-center">
                <div className="flex items-center gap-2 bg-zinc-900/80 px-3 py-1.5 rounded-full border border-zinc-800" title="Traders en ligne">
                  <span className="relative flex h-2.5 w-2.5">
                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                  </span>
                  <Users className="w-4 h-4 text-zinc-400" />
                  <span className="font-mono font-medium text-zinc-300">{onlineCount}</span>
                </div>

                <div className="flex flex-col items-end border-l border-zinc-800 pl-6 hidden sm:flex">
                  <span className="text-zinc-500 flex items-center gap-1"><Briefcase className="w-4 h-4"/> Portefeuille</span>
                  <span className="font-mono text-lg font-medium">{totalValue.toLocaleString('fr-FR', { style: 'currency', currency: 'USD' })}</span>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-6 py-8">
            
            {/* ONGLET 1 : TRADING CLASSIQUE */}
            {activeTab === 'trade' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div className="lg:col-span-2 space-y-6">
                  <div className="flex justify-between items-end">
                    <div>
                      <p className="text-zinc-400 text-sm mb-1 uppercase tracking-wider font-semibold">Tension du Marché (Global)</p>
                      <div className="flex items-baseline gap-2 sm:gap-3">
                        <h2 className="text-4xl sm:text-5xl font-bold font-mono tracking-tighter">
                          ${market.price.toFixed(2)}
                        </h2>
                        <span className={`flex items-center font-mono text-base sm:text-lg ${isPositiveTrend ? 'text-emerald-400' : 'text-rose-400'}`}>
                          {isPositiveTrend ? <TrendingUp className="w-4 h-4 sm:w-5 sm:h-5 mr-1" /> : <TrendingDown className="w-4 h-4 sm:w-5 sm:h-5 mr-1" />}
                          {Math.abs(percentChange).toFixed(2)}%
                        </span>
                      </div>
                    </div>
                  </div>

                  <div className="h-64 lg:h-96 w-full bg-[#121214] border border-zinc-800 rounded-2xl p-4 shadow-2xl relative">
                    <SparklineChart 
                      data={market.history} 
                      isPositive={isPositiveTrend} 
                      averageBuyPrice={portfolio?.averageBuyPrice}
                      sharesCount={portfolio?.shares}
                    />
                    <div className="absolute inset-0 pointer-events-none opacity-[0.03]" style={{ backgroundImage: 'linear-gradient(to right, #fff 1px, transparent 1px), linear-gradient(to bottom, #fff 1px, transparent 1px)', backgroundSize: '40px 40px' }}></div>
                  </div>

                  <div className={`p-4 rounded-xl border flex items-start gap-4 transition-colors duration-500 ${
                    market.newsType === 'positive' ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-200' : 
                    market.newsType === 'negative' ? 'bg-rose-500/10 border-rose-500/20 text-rose-200' : 
                    'bg-zinc-800/50 border-zinc-700/50 text-zinc-300'
                  }`}>
                    <Zap className={`w-6 h-6 shrink-0 mt-0.5 ${market.newsType === 'positive' ? 'text-emerald-400' : market.newsType === 'negative' ? 'text-rose-400' : 'text-zinc-400'}`} />
                    <div>
                      <p className="text-xs uppercase font-bold opacity-70 mb-1">Dernière Actualité</p>
                      <p className="text-lg font-medium leading-snug">{market.news}</p>
                    </div>
                  </div>
                </div>

                <div className="space-y-6">
                  <div className="bg-[#121214] border border-zinc-800 rounded-2xl p-6 shadow-xl">
                    <h3 className="text-lg font-semibold mb-6 flex items-center gap-2 border-b border-zinc-800 pb-4">
                      <DollarSign className="w-5 h-5 text-emerald-500" /> Vos Fonds
                    </h3>
                    
                    <div className="space-y-4 mb-6">
                      <div className="flex justify-between items-center bg-zinc-900/50 p-3 rounded-lg border border-zinc-800/50">
                        <span className="text-zinc-400">Liquidités</span>
                        <span className="font-mono text-xl">{portfolio.balance.toLocaleString('fr-FR', { style: 'currency', currency: 'USD' })}</span>
                      </div>
                      <div className="flex justify-between items-center bg-zinc-900/50 p-3 rounded-lg border border-zinc-800/50">
                        <span className="text-zinc-400">Actions possedées</span>
                        <span className="font-mono text-xl font-bold text-blue-400">{portfolio.shares} <span className="text-sm font-normal text-zinc-600">unités</span></span>
                      </div>
                      {portfolio.shares > 0 && (
                        <>
                          <div className="flex justify-between items-center bg-zinc-900/50 p-3 rounded-lg border border-zinc-800/50">
                            <span className="text-zinc-400">Prix d'achat moyen</span>
                            <span className="font-mono text-lg text-zinc-300">${(portfolio.averageBuyPrice || 0).toFixed(2)}</span>
                          </div>
                          <div className="flex justify-between items-center bg-zinc-900/50 p-3 rounded-lg border border-zinc-800/50">
                            <span className="text-zinc-400">Gains / Pertes</span>
                            <span className={`font-mono text-lg ${market.price >= portfolio.averageBuyPrice ? 'text-emerald-400' : 'text-rose-400'}`}>
                              {market.price >= portfolio.averageBuyPrice ? '+' : ''}{((market.price - portfolio.averageBuyPrice) * portfolio.shares).toFixed(2)}$
                              <span className="text-sm ml-1 opacity-80">
                                ({market.price >= portfolio.averageBuyPrice ? '+' : ''}{portfolio.averageBuyPrice > 0 ? (((market.price - portfolio.averageBuyPrice) / portfolio.averageBuyPrice) * 100).toFixed(2) : "0.00"}%)
                              </span>
                            </span>
                          </div>
                        </>
                      )}
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <button
                        onClick={() => handleTrade('BUY')}
                        disabled={portfolio.balance < market.price}
                        className="relative overflow-hidden group bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 rounded-xl py-4 font-bold text-lg transition-all active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed"
                      >
                        <div className="absolute inset-0 bg-gradient-to-t from-emerald-500/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        ACHETER
                      </button>
                      
                      <button
                        onClick={() => handleTrade('SELL')}
                        disabled={portfolio.shares <= 0}
                        className="relative overflow-hidden group bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/30 rounded-xl py-4 font-bold text-lg transition-all active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed"
                      >
                        <div className="absolute inset-0 bg-gradient-to-t from-rose-500/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        VENDRE
                      </button>
                    </div>

                    <p className="text-xs text-zinc-600 mt-6 text-center flex items-center justify-center gap-1">
                      <AlertCircle className="w-3 h-3 shrink-0" /> Vos actions influencent le cours global.
                    </p>
                  </div>
                </div>
              </div>
            )}

            {/* ONGLET 2 : RÉCOMPENSES */}
            {activeTab === 'rewards' && (
              <div className="max-w-2xl mx-auto mt-10">
                <div className="bg-[#121214] border border-indigo-500/30 rounded-3xl p-8 shadow-[0_0_40px_rgba(99,102,241,0.1)] text-center relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-indigo-500"></div>
                  
                  <Gift className="w-20 h-20 text-indigo-400 mx-auto mb-6 drop-shadow-[0_0_15px_rgba(99,102,241,0.5)]" />
                  
                  <h2 className="text-3xl font-bold mb-2">Salaire Journalier</h2>
                  <p className="text-zinc-400 mb-8 max-w-md mx-auto">
                    Récupère tes liquidités quotidiennes pour réinvestir sur le marché. Ne manque pas une journée !
                  </p>

                  <div className="bg-zinc-900/50 rounded-2xl p-6 border border-zinc-800/80 mb-8 w-full sm:w-auto sm:min-w-[250px] inline-block">
                    <p className="text-sm font-semibold text-zinc-400 mb-2 uppercase tracking-wider">Statut</p>
                    {timeToReward === 0 ? (
                      <p className="text-3xl sm:text-4xl font-mono font-bold text-indigo-400">+${REWARD_AMOUNT}</p>
                    ) : (
                      <p className="text-2xl sm:text-3xl font-mono font-medium text-zinc-300">{formatTime(timeToReward)}</p>
                    )}
                  </div>

                  <div>
                    <button
                      onClick={handleClaimReward}
                      disabled={timeToReward > 0}
                      className={`px-8 py-4 w-full sm:w-auto rounded-xl text-lg font-bold transition-all ${
                        timeToReward === 0 
                        ? 'bg-indigo-500 hover:bg-indigo-600 text-white shadow-[0_0_25px_rgba(99,102,241,0.5)] cursor-pointer active:scale-95' 
                        : 'bg-zinc-800 text-zinc-600 cursor-not-allowed'
                      }`}
                    >
                      {timeToReward === 0 ? 'Encaisser mon salaire' : 'Reviens plus tard'}
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* ONGLET 3 : CLASSEMENT (LEADERBOARD) */}
            {activeTab === 'leaderboard' && (
              <div className="max-w-2xl mx-auto mt-4">
                
                {/* 1. Demande de pseudo si pas défini */}
                {!portfolio?.pseudo ? (
                  <div className="bg-[#121214] border border-zinc-800 rounded-2xl p-8 shadow-xl text-center">
                    <Trophy className="w-16 h-16 text-amber-500 mx-auto mb-6" />
                    <h3 className="text-2xl font-bold mb-3">Rejoindre le Classement</h3>
                    <p className="text-zinc-400 text-sm mb-8 max-w-md mx-auto">
                      Pour apparaître dans le top des meilleurs traders mondiaux, choisis un pseudo unique. Ce choix est définitif.
                    </p>
                    
                    <div className="flex flex-col sm:flex-row gap-3 max-w-sm mx-auto">
                      <input 
                        type="text" 
                        maxLength="15" 
                        value={pseudoInput} 
                        onChange={e => setPseudoInput(e.target.value)} 
                        placeholder="Ton pseudo..." 
                        className="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 font-medium" 
                      />
                      <button 
                        onClick={handleSetPseudo} 
                        disabled={!pseudoInput.trim()}
                        className="bg-amber-500 hover:bg-amber-600 disabled:opacity-50 disabled:hover:bg-amber-500 text-black font-bold py-3 px-6 rounded-xl transition-colors whitespace-nowrap"
                      >
                        Valider
                      </button>
                    </div>
                  </div>
                ) : (
                  
                  /* 2. Affichage du tableau des scores */
                  <div className="bg-[#121214] border border-zinc-800 rounded-2xl shadow-xl overflow-hidden">
                    <div className="p-4 sm:p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/30">
                      <h3 className="text-lg sm:text-xl font-bold flex items-center gap-2 sm:gap-3">
                        <Trophy className="text-amber-500 w-5 h-5 sm:w-6 sm:h-6"/> 
                        Top 50 Mondial
                      </h3>
                      <div className="text-right text-xs sm:text-sm">
                        <p className="text-zinc-400">Ton pseudo</p>
                        <p className="font-bold text-amber-400 truncate max-w-[100px] sm:max-w-[150px]">{portfolio.pseudo}</p>
                      </div>
                    </div>
                    
                    <div className="p-2">
                      {leaderboard.length === 0 ? (
                        <p className="text-zinc-500 text-center py-10">Calcul des scores en cours...</p>
                      ) : (
                        <div className="space-y-1">
                          {leaderboard.map((player, index) => {
                            const profit = player.totalValue - 10000;
                            const isMe = player.pseudo === portfolio.pseudo;
                            
                            return (
                              <div key={index} className={`flex justify-between items-center p-3 sm:p-4 rounded-xl transition-colors ${isMe ? 'bg-amber-500/10 border border-amber-500/20' : 'hover:bg-zinc-900/50 border border-transparent'}`}>
                                <div className="flex items-center gap-2 sm:gap-4 overflow-hidden">
                                  <span className={`font-mono font-bold text-base sm:text-lg w-6 sm:w-8 shrink-0 text-center ${index === 0 ? 'text-amber-400' : index === 1 ? 'text-zinc-300' : index === 2 ? 'text-amber-700' : 'text-zinc-600'}`}>
                                    #{index + 1}
                                  </span>
                                  <span className={`font-bold text-sm sm:text-base truncate ${isMe ? 'text-amber-400' : 'text-zinc-200'}`}>
                                    {player.pseudo}
                                  </span>
                                </div>
                                <div className="text-right shrink-0 ml-2">
                                  <p className="font-mono font-bold text-sm sm:text-base text-zinc-100">${player.totalValue.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</p>
                                  <p className={`text-xs font-mono font-medium ${profit >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                                    {profit >= 0 ? '+' : ''}{profit.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}$
                                  </p>
                                </div>
                              </div>
                            )
                          })}
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            )}

          </main>

          {/* BARRE DE NAVIGATION INFÉRIEURE (MOBILE & DESKTOP) */}
          <nav className="fixed bottom-0 w-full bg-[#09090b]/95 backdrop-blur-lg border-t border-zinc-800 z-50">
            <div className="max-w-md mx-auto flex justify-between px-4 sm:px-8 py-3">
              <button 
                onClick={() => setActiveTab('trade')} 
                className={`flex flex-col items-center gap-1.5 transition-colors ${activeTab === 'trade' ? 'text-emerald-400' : 'text-zinc-500 hover:text-zinc-300'}`}
              >
                <LineChart className="w-6 h-6" />
                <span className="text-[10px] font-bold uppercase tracking-wider">Bourse</span>
              </button>
              
              <button 
                onClick={() => setActiveTab('rewards')} 
                className={`flex flex-col items-center gap-1.5 transition-colors relative ${activeTab === 'rewards' ? 'text-indigo-400' : 'text-zinc-500 hover:text-zinc-300'}`}
              >
                {timeToReward === 0 && (
                  <span className="absolute top-0 right-1 w-2.5 h-2.5 bg-indigo-500 rounded-full border-2 border-[#09090b]"></span>
                )}
                <Gift className="w-6 h-6" />
                <span className="text-[10px] font-bold uppercase tracking-wider">Bonus</span>
              </button>
              
              <button 
                onClick={() => setActiveTab('leaderboard')} 
                className={`flex flex-col items-center gap-1.5 transition-colors ${activeTab === 'leaderboard' ? 'text-amber-400' : 'text-zinc-500 hover:text-zinc-300'}`}
              >
                <Trophy className="w-6 h-6" />
                <span className="text-[10px] font-bold uppercase tracking-wider">Top 50</span>
              </button>
            </div>
          </nav>

        </div>
      );
    }

    // --- RENDU SUR LA PAGE HTML ---
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
    </script>
</body>
</html>
