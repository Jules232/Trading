    // --- SYNTHÉTISEUR AUDIO WEB AUDIO API ---
    let globalAudioCtx = null;
    const playSound = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        if (!globalAudioCtx) globalAudioCtx = new AudioContext();
        if (globalAudioCtx.state === 'suspended') globalAudioCtx.resume().catch(() => {});
        
        const ctx = globalAudioCtx;
        const now = ctx.currentTime;

        if (type === 'claim' || type === 'win' || type === 'buy_upgrade') {
          const notes = type === 'buy_upgrade' ? [440, 554.37, 659.25, 880] : (type === 'claim' ? [587.33, 880] : [523.25, 659.25, 783.99, 1046.50]);
          notes.forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = type === 'buy_upgrade' ? 'triangle' : 'sine';
            osc.frequency.setValueAtTime(freq, now + i * 0.08);
            gain.gain.setValueAtTime(0.12, now + i * 0.08);
            gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.25);
            osc.start(now + i * 0.08); osc.stop(now + i * 0.08 + 0.3);
          });
        } else if (type === 'lose' || type === 'error') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(type === 'error' ? 150 : 220, now);
          osc.frequency.linearRampToValueAtTime(type === 'error' ? 100 : 110, now + 0.45);
          gain.gain.setValueAtTime(0.12, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.45);
          osc.start(now); osc.stop(now + 0.5);
        } else if (type === 'tick') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(800, now);
          gain.gain.setValueAtTime(0.05, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.04);
          osc.start(now); osc.stop(now + 0.05);
        }

    // --- COMPOSANT GRAPHIQUE SVG AMÉLIORÉ ---
    const SparklineChart = ({ data, isPositive, averageBuyPrice, sharesCount, zoomLevel, showMarkers, transactions, themeColor, tickDelay = 1000 }) => {
      const containerRef = useRef(null);
      const [dimensions, setDimensions] = useState({ width: 0, height: 0 });

      useEffect(() => {
        if (!containerRef.current) return;
        const observer = new ResizeObserver(entries => {
          if (!Array.isArray(entries) || !entries.length) return;
          const { width, height } = entries[0].contentRect;
          setDimensions({ width, height });
        });
        observer.observe(containerRef.current);
        return () => observer.disconnect();
      }, []);

      const { width, height } = dimensions;

      const visibleData = useMemo(() => {
        if (!data || data.length === 0) return [];
        const visibleCount = Math.max(10, Math.floor(data.length / zoomLevel));
        return data.slice(-visibleCount);
      }, [data, zoomLevel]);

      const chartStats = useMemo(() => {
        if (!visibleData || visibleData.length === 0 || width === 0 || height === 0) return null;
        let minVal = Math.min(...visibleData);
        let maxVal = Math.max(...visibleData);
        if (sharesCount > 0 && averageBuyPrice) {
          minVal = Math.min(minVal, averageBuyPrice);
          maxVal = Math.max(maxVal, averageBuyPrice);
        }
        minVal *= 0.99; maxVal *= 1.01;
        const range = maxVal - minVal || 1;

        const points = visibleData.map((val, index) => {
          const x = visibleData.length > 1 ? (index / (visibleData.length - 1)) * width : width / 2;
          const y = height - ((val - minVal) / range) * height;
          return `${x},${y}`;
        });

        return { path: `M ${points.join(' L ')}`, minVal, maxVal, range, dataLength: visibleData.length };
      }, [visibleData, width, height, averageBuyPrice, sharesCount]);

      const defaultColor = isPositive ? '#10b981' : '#f43f5e';
      const color = themeColor === 'amber' ? '#f59e0b' : themeColor === 'fuchsia' ? '#d946ef' : themeColor === 'pink' ? '#ec4899' : themeColor === 'cyan' ? '#06b6d4' : themeColor === 'red' ? '#ef4444' : themeColor === 'sky' ? '#0ea5e9' : defaultColor;

      return (
        <div ref={containerRef} className="w-full h-full relative overflow-hidden rounded-xl">
          {width > 0 && height > 0 && chartStats && (
            <svg width={width} height={height} className="overflow-visible">
              <defs>
                <linearGradient id="gradient" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0%" stopColor={color} stopOpacity="0.3" />
                  <stop offset="100%" stopColor={color} stopOpacity="0.0" />
                </linearGradient>
              </defs>
              
              <path d={`${chartStats.path} L ${width},${height} L 0,${height} Z`} fill="url(#gradient)" className="transition-all duration-300 ease-linear" />
              <path d={chartStats.path} fill="none" stroke={color} strokeWidth="3" strokeLinejoin="round" strokeLinecap="round" className="transition-all duration-300 ease-linear" style={{ filter: `drop-shadow(0 0 8px ${color}88)` }} />
              
              {sharesCount > 0 && averageBuyPrice > 0 && (
                <g className="transition-all duration-500 ease-in-out">
                  <line x1="0" y1={height - ((averageBuyPrice - chartStats.minVal) / chartStats.range) * height} x2={width} y2={height - ((averageBuyPrice - chartStats.minVal) / chartStats.range) * height} stroke="#a1a1aa" strokeWidth="1.5" strokeDasharray="6,4" className="opacity-70" />
                  <rect x="10" y={Math.max(5, Math.min(height - 25, height - ((averageBuyPrice - chartStats.minVal) / chartStats.range) * height - 12))} width="74" height="18" rx="4" fill="#27272a" className="opacity-95" />
                  <text x="14" y={Math.max(17, Math.min(height - 13, height - ((averageBuyPrice - chartStats.minVal) / chartStats.range) * height + 1))} fill="#e4e4e7" fontSize="9" fontWeight="bold" fontFamily="monospace">
                    ACHAT: ${averageBuyPrice.toFixed(1)}
                  </text>
                </g>
              )}

              {/* Correction de la position temporelle et verticale des marqueurs */}
              {showMarkers && transactions && transactions.map((tx, i) => {
                 const timeDiff = Date.now() - tx.time;
                 const windowMs = chartStats.dataLength * tickDelay; 
                 
                 // On ne dessine pas les points qui sont sortis de la fenêtre temporelle
                 if (timeDiff > windowMs || timeDiff < 0) return null;
                 
                 const x = width - (timeDiff / windowMs) * width;
                 const y = height - ((tx.price - chartStats.minVal) / chartStats.range) * height;
                 
                 // On ne dessine pas les points qui sortiraient par erreur du cadre de la div
                 if (isNaN(x) || isNaN(y) || y < -20 || y > height + 20) return null;

                 const txColor = tx.type === 'BUY' ? '#10b981' : '#f43f5e';
                 
                 return (
                   <g key={i} className="animate-in fade-in zoom-in duration-500">
                     <circle cx={x} cy={y} r="5" fill={txColor} opacity="0.8" style={{ filter: `drop-shadow(0 0 4px ${txColor})` }}/>
                     <circle cx={x} cy={y} r="8" fill="none" stroke={txColor} strokeWidth="1.5" className="animate-ping opacity-50" />
                   </g>
                 )

            </svg>
          )}

        let activeNodes = []; 
        
        const chords = [
            [261.63, 329.63, 392.00], // C
            [220.00, 261.63, 329.63], // Am
            [174.61, 220.00, 261.63], // F
            [196.00, 246.94, 293.66]  // G
        ];

        const playNextChord = () => {
            try {
                if (!globalAudioCtx) globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const ctx = globalAudioCtx;
                if (ctx.state === 'suspended') ctx.resume().catch(() => {});
                
                const freqs = chords[step];
                const now = ctx.currentTime;
                
                freqs.forEach(f => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    const filter = ctx.createBiquadFilter();
                    
                    filter.type = 'lowpass';
                    filter.frequency.value = 600; 

                    osc.connect(filter);
                    filter.connect(gain);
                    gain.connect(ctx.destination);
                    
                    osc.type = 'triangle';
                    osc.frequency.value = f / 2; 
                    
                    gain.gain.setValueAtTime(0.001, now);
                    gain.gain.exponentialRampToValueAtTime(0.02, now + 2); 
                    gain.gain.setValueAtTime(0.02, now + 4); 
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 6); 
                    
                    osc.start(now);
                    osc.stop(now + 6);

                    activeNodes.push({ osc, gain });
                });
                
                activeNodes = activeNodes.filter(n => n.osc.context.currentTime < now + 6);

            }

                 };

                 let actionTaken = false;
                 
                 for (const mId of MARKET_IDS) {
                     const market = currentMarkets[mId];
                     if (!market || !market.history || market.history.length < 10) continue;

                     const currentPrice = market.price;
                     const history = market.history;
                     const sma10 = history.slice(-10).reduce((a, b) => a + b, 0) / 10;
                     const trendRatio = (currentPrice - sma10) / sma10; 
                     
                     if (!botData.assets) botData.assets = {};
                     if (!botData.assets[mId]) botData.assets[mId] = { shares: 0, averageBuyPrice: 0 };
                     
                     const asset = botData.assets[mId];
                     const profitPercent = asset.shares > 0 ? (currentPrice - asset.averageBuyPrice) / asset.averageBuyPrice : 0;
                     
                     let type = null;
                     let allocRatio = 0; 

                     if (bot.profile === 'prudent') {
                         if (mId === 'm_fast' || mId === 'm_btc' || mId === 'm_eth') continue; 
                         if (asset.shares > 0 && profitPercent >= 0.05) { type = 'SELL'; } 
                         else if (asset.shares > 0 && profitPercent <= -0.02) { type = 'SELL'; } 
                         else if (asset.shares === 0 && trendRatio < -0.01 && trendRatio >= -0.04) { type = 'BUY'; allocRatio = 0.2; } 
                     } 
                     else if (bot.profile === 'balanced') {
                         if (asset.shares > 0 && profitPercent >= 0.12) { type = 'SELL'; } 
                         else if (asset.shares > 0 && profitPercent <= -0.06) { type = 'SELL'; } 
                         else if (asset.shares === 0 && (trendRatio < -0.03 || market.newsType === 'positive')) { type = 'BUY'; allocRatio = 0.4; } 
                     } 
                     else if (bot.profile === 'aggressive') {
                         if (mId === 'm_slow') continue; 
                         const flash = market.flashEvent;
                         
                         if (flash && flash.active && flash.type === 'bull_run' && asset.shares === 0) { type = 'BUY'; allocRatio = 0.9; } 
                         else if (flash && flash.active && flash.type === 'flash_crash' && asset.shares > 0) { type = 'SELL'; } 
                         else if (asset.shares > 0 && profitPercent >= 0.25) { type = 'SELL'; } 
                         else if (asset.shares > 0 && profitPercent <= -0.15) { type = 'SELL'; } 
                         else if (asset.shares === 0 && trendRatio > 0.02) { type = 'BUY'; allocRatio = 0.6; } 
                     }

                     if (type === 'BUY' && allocRatio > 0) {
                         let maxQty = Math.floor((botData.balance * allocRatio) / currentPrice);
                         const qty = Math.min(maxQty, 15); 
                         if (qty > 0 && botData.balance >= qty * currentPrice) {
                             const cost = qty * currentPrice;
                             asset.averageBuyPrice = ((asset.shares * asset.averageBuyPrice) + cost) / (asset.shares + qty);
                             asset.shares += qty;
                             botData.balance -= cost;
                             botData.stats.totalTrades++;
                             actionTaken = true;
                             
                             const impactOnTrend = 0.5 * (MARKETS_CONFIG[mId].vol / 2.5) * qty; 
                             const sentimentImpact = 3 * qty;
                             const mRef = doc(db, 'artifacts', appId, 'public', 'data', 'markets', mId);
                             setDoc(mRef, { 
                                 trend: market.trend + impactOnTrend,
                                 sentimentScore: (market.sentimentScore || 0) + sentimentImpact,
                                 lastUpdate: Date.now()
                             }, { merge: true }).catch(()=>{});
                         }
                     } else if (type === 'SELL' && asset.shares > 0) {
                         const qty = Math.min(asset.shares, 15); 
                         const gain = qty * currentPrice;
                         const profit = gain - (qty * asset.averageBuyPrice);
                         asset.shares -= qty;
                         if(asset.shares === 0) asset.averageBuyPrice = 0;
                         botData.balance += gain;
                         botData.stats.totalTrades++;
                         botData.stats.totalProfit += profit;
                         
                         if (profit > 0) botData.stats.winningTrades++;
                         if (profit > botData.stats.bestTrade) botData.stats.bestTrade = profit;
                         if (profit < botData.stats.worstTrade) botData.stats.worstTrade = profit;
                         actionTaken = true;

                         const impactOnTrend = -0.5 * (MARKETS_CONFIG[mId].vol / 2.5) * qty; 
                         const sentimentImpact = -3 * qty;

                             trend: market.trend + impactOnTrend,
                             sentimentScore: (market.sentimentScore || 0) + sentimentImpact,
                             lastUpdate: Date.now()
                         }, { merge: true }).catch(()=>{});
                     }
                 }

                 if (actionTaken || (now - botData.lastAction > 15000)) {
                     botData.lastAction = now + Math.floor(Math.random() * 4000); 
                     botData.stats.playTimeSeconds += 15;
                     
                     let botTotalValue = botData.balance;

                         totalValue: botTotalValue,
                         lastUpdated: now,
                         stats: botData.stats
                     }, { merge: true }).catch(() => {});
                 }

                 console.warn("Erreur exécution bot silencieuse ignorée");
             }

                      <AlertCircle className="w-10 h-10 text-rose-500 animate-pulse" />
                   </div>
                   <h2 className="text-3xl font-black text-white mb-2 break-words">GAME OVER</h2>
                   <p className="text-sm text-zinc-400 mb-6 break-words">
                      Votre solde est descendu en dessous de zéro (<span className="text-rose-400 font-bold font-mono break-all">{portfolio.balance.toFixed(2)}$</span>). Vous êtes ruiné et la banque a saisi vos actifs restants pour rembourser vos dettes.
                   </p>
                   <button 
                      onClick={async () => {
                          const portfolioRef = doc(db, 'artifacts', appId, 'users', user.uid, 'portfolio', 'state');
                          await setDoc(portfolioRef, {
                              balance: 10000,
                              assets: { 'm_slow': { shares: 0, averageBuyPrice: 0 }, 'm_medium': { shares: 0, averageBuyPrice: 0 }, 'm_fast': { shares: 0, averageBuyPrice: 0 }, 'm_elite': { shares: 0, averageBuyPrice: 0 }, 'm_btc': { shares: 0, averageBuyPrice: 0 }, 'm_eth': { shares: 0, averageBuyPrice: 0 }, 'm_longterm': { shares: 0, averageBuyPrice: 0 } },
                              transactions: { 'm_slow': [], 'm_medium': [], 'm_fast': [], 'm_elite': [], 'm_btc': [], 'm_eth': [] }
                          }, { merge: true });
                          playSound('claim');
                      }}
                      className="w-full bg-rose-600 hover:bg-rose-500 text-white font-bold py-3.5 rounded-xl transition-all active:scale-95 hover:-translate-y-0.5 shadow-lg shadow-rose-600/20 break-words px-2"
                   >
                      Se déclarer en faillite (Repartir avec 10 000$)
                   </button>
                </div>
             </div>
          )}

          {/* MODALE DU PROFIL D'UN AUTRE JOUEUR (CLASSEMENT) ANTI-DÉBORDEMENT */}
          {selectedPlayer && (
             <div className="fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in zoom-in duration-300">
                <div className={`${theme.panel} border ${theme.border} p-5 sm:p-8 rounded-3xl max-w-2xl w-full relative shadow-[0_0_50px_rgba(0,0,0,0.8)] max-h-[85vh] flex flex-col overflow-hidden min-w-0`}>
                   <button onClick={() => setSelectedPlayer(null)} className="absolute top-4 right-4 p-2 bg-white/5 hover:bg-rose-500/20 hover:text-rose-400 rounded-full transition-colors z-10 shrink-0 active:scale-95">
                       <X className="w-5 h-5"/>
                   </button>
                   <div className="flex items-center gap-3 sm:gap-4 mb-6 border-b border-white/10 pb-4 shrink-0 min-w-0">
                       <div className="w-12 h-12 sm:w-14 sm:h-14 rounded-full bg-amber-500/20 border border-amber-500/50 flex items-center justify-center text-amber-400 shrink-0 transition-transform duration-500 hover:scale-105">
                          <User className="w-6 h-6 sm:w-7 sm:h-7" />
                       </div>
                       <div className="overflow-hidden pr-8 min-w-0 flex-1">
                          <h2 className="text-xl sm:text-2xl font-black text-white truncate">{selectedPlayer.pseudo}</h2>
                          <p className="text-[10px] sm:text-sm text-amber-400/80 font-mono font-bold truncate transition-colors" title={selectedPlayer.totalValue.toLocaleString('fr-FR', { style: 'currency', currency: 'USD' })}>Valeur globale : {selectedPlayer.totalValue.toLocaleString('fr-FR', { style: 'currency', currency: 'USD' })}</p>
                       </div>
                   </div>
                   <div className="overflow-y-auto scrollbar-hide pb-2 flex-1 min-w-0">
                      <StatsCard stats={selectedPlayer.stats} isCurrentUser={false} />
                      
                      {isAdminMode && (
                         <div className="mt-6 pt-4 border-t border-rose-500/30">
                            <button 
                               onClick={async () => {
                                  if (confirmResetPlayerId !== selectedPlayer.id) {
                                      setConfirmResetPlayerId(selectedPlayer.id);
                                      setTimeout(() => setConfirmResetPlayerId(null), 3000);
                                  } else {
                                      const pRef = doc(db, 'artifacts', appId, 'users', selectedPlayer.id, 'portfolio', 'state');
                                      await setDoc(pRef, { balance: 10000 }, { merge: true });
                                      
                                      const lbRef = doc(db, 'artifacts', appId, 'public', 'data', 'leaderboard', selectedPlayer.id);
                                      await setDoc(lbRef, { totalValue: 10000 }, { merge: true });

                                      addNotification(`Argent de ${selectedPlayer.pseudo} réinitialisé.`, "success");
                                      setConfirmResetPlayerId(null);
                                      setSelectedPlayer(null);
                                  }
                               }}
                               className={`w-full font-bold py-2.5 rounded-xl transition-all active:scale-95 text-xs sm:text-sm flex justify-center items-center gap-2 px-2 truncate ${confirmResetPlayerId === selectedPlayer.id ? 'bg-rose-600 text-white animate-pulse' : 'bg-rose-600/20 hover:bg-rose-600/40 text-rose-400 border border-rose-500/50 hover:-translate-y-0.5'}`}
                            >
                               <Shield className="w-4 h-4 shrink-0"/> 
                               {confirmResetPlayerId === selectedPlayer.id ? 'Confirmer (Recliquer)' : 'Admin : Remettre son argent à 10 000$'}
                            </button>
                         </div>
                      )}
                   </div>
                </div>
             </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
    </script>
</body>
</html>
